<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>

  <style>
    body {
      background: #0b0b0b;
      color: #ffffff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 480px;
      margin: auto;
    }

    h1 {
      color: #ff7a00;
      text-align: center;
    }

    .card {
      background: #151515;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }

    input, select, textarea, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #ff7a00;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>✅ STYLED PAGE WORKS</h1>

    <div class="card">
      <p>If you see this card on a black background, CSS is safe.</p>

      <input placeholder="Example input">
      <button>Test Button</button>
    </div>
  </div>
</body>
</html>

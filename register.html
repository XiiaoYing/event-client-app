<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register Now</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Montserrat", sans-serif;
      background: radial-gradient(circle at top, #111 0%, #000 60%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: linear-gradient(180deg, #1a1a1a, #0e0e0e);
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    h1 {
      text-align: center;
      color: #ff7a00;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    p.subtitle {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #ffb26a;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #222;
      color: #fff;
      margin-bottom: 18px;
      font-size: 14px;
    }

    input::placeholder {
      color: #777;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      color: #aaa;
      font-size: 13px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      background: #ff7a00;
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .success {
      text-align: center;
      color: #5bff9c;
      margin-top: 16px;
      font-size: 14px;
      display: none;
    }

    .error {
      text-align: center;
      color: #ff5b5b;
      margin-top: 16px;
      font-size: 14px;
      display: none;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>REGISTER NOW</h1>
  <p class="subtitle">
    Secure your slot and keep your body feeling loose, refreshed, and competition‑ready.
  </p>

  <form id="registerForm">

    <label>FULL NAME</label>
    <input id="full_name" required>

    <label>DATE OF BIRTH</label>
    <input type="date" id="dob" required>

    <div class="info-row">
      <span>Age:</span>
      <span id="ageText">–</span>
    </div>

    <label>GENDER</label>
    <select id="gender" required>
      <option value="">Select</option>
      <option>Male</option>
      <option>Female</option>
    </select>

    <label>CITIZENSHIP</label>
    <select id="citizenship" required>
      <option>Malaysian</option>
      <option>Foreigner</option>
    </select>

    <label>IC / PASSPORT</label>
    <input id="ic">

    <label>CONTACT</label>
    <input id="contact">

    <label>EMAIL</label>
    <input type="email" id="email">

    <label>ADDRESS</label>
    <textarea id="address"></textarea>

    <button type="submit">SUBMIT REGISTRATION</button>

    <div class="success" id="successMsg">✅ Registration successful</div>
    <div class="error" id="errorMsg">❌ Please try again</div>

  </form>
</div>

<script>
/* ========= SUPABASE ========= */
const SUPABASE_URL = "https://yxkospvcqkoxiravjtqd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4a29zcHZjcWtveGlyYXZqdHFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODEyNzEsImV4cCI6MjA5MTg1NzI3MX0.Aaw6wfcXf21uwgMQJWtiVN_vxqaqevEQerx2GjOG-Jc";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ========= AGE CALC ========= */
dob.onchange = () => {
  const d = new Date(dob.value);
  if (!d) return;
  const age = Math.floor((Date.now() - d) / (365.25 * 86400000));
  ageText.textContent = age;
};

/* ========= SUBMIT ========= */
registerForm.onsubmit = async (e) => {
  e.preventDefault();
  successMsg.style.display = "none";
  errorMsg.style.display = "none";

  const { error } = await sb.from("clients").insert({
    full_name: full_name.value,
    date_of_birth: dob.value,
    gender: gender.value,
    citizenship: citizenship.value,
    ic_passport: ic.value,
    contact: contact.value,
    email: email.value,
    address: address.value
  });

  if (error) {
    console.error(error);
    errorMsg.style.display = "block";
  } else {
    successMsg.style.display = "block";
    registerForm.reset();
    ageText.textContent = "–";
  }
};
</script>

</body>
</html>

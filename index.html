<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<!-- Google Font -->
https://fonts.googleapis.com
https://fonts.gstatic.com
<link href="https://fonts.googleapismily=Montserrat:wght@400;600;700&display=swap

<!-- Supabase -->
https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2

<!-- Chart.js -->
https://cdn.jsdelivr.net/npm/chart.js

<!-- XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.minbody{margin:0;font-family:Montserrat;background:#f4f4f4}
header{display:flex;gap:10px;padding:12px;background:#111}
header button{background:#333;color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer}
header button.active{background:#ff7a00;color:#000;font-weight:700}
.container{max-width:1200px;margin:auto;padding:20px}
.hidden{display:none}
.card{background:#fff;padding:16px;border-radius:8px;margin-bottom:20px}
label{font-size:12px;font-weight:600;display:block;margin-top:10px}
input,select,textarea{width:100%;padding:8px;margin-top:4px}
button.primary{margin-top:12px;background:#ff7a00;border:none;padding:8px 14px;border-radius:6px;cursor:pointer}
button.danger{background:#e74c3c;color:#fff;border:none;padding:6px 10px;border-radius:6px}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:8px;border-bottom:1px solid #ddd;font-size:13px}
th{background:#f0f0f0}
.flex{display:flex;gap:20px;flex-wrap:wrap}
</style>
</head>

<body>

<header>
  <button id="tabClients" class="active">Clients</button>
  <button id="tabPractitioners">Practitioners</button>
  <button id="tabAppointments">Appointments</button>
  <button id="tabReports">Sales Report</button>
</header>

<div class="container">

<!-- ================= SALES REPORT ONLY (others assumed locked & unchanged) ================= -->

<section id="reportsTab" class="hidden">

<div class="card">
  <h3>Filters</h3>
  <label>From Date</label><input type="date" id="reportFrom">
  <label>To Date</label><input type="date" id="reportTo">
  <label>Breakdown</label>
  <select id="reportMode">
    <option value="daily">Daily</option>
    <option value="monthly">Monthly</option>
  </select>
  <button class="primary" id="applyReportBtn">Apply</button>
  <button class="primary" id="exportExcelBtn">Export Excel</button>
</div>

<div class="card">
  <h3>Age Range Configuration</h3>
  <div id="ageRangeConfig"></div>
  <button class="primary" id="addAgeRangeBtn">+ Add Range</button>
</div>

<div class="flex">
  <div class="card" style="flex:1;background:#E3F2FD">
    <h4>Total Sales</h4>
    <h2>RM <span id="totalSales">0.00</span></h2>
  </div>
  <div class="card" style="flex:1;background:#FFF3E0">
    <h4>Total SST</h4>
    <h2>RM <span id="totalSST">0.00</span></h2>
  </div>
</div>

<div class="card">
  <h3>Sales by Service</h3>
  <canvas id="serviceChart"></canvas>
</div>

<div class="card">
  <h3>Daily / Monthly Sales</h3>
  <canvas id="timeChart"></canvas>
</div>

<div class="flex">
  <div class="card" style="flex:1">
    <h3>Age Distribution</h3>
    <canvas id="ageChart"></canvas>
  </div>
  <div class="card" style="flex:1">
    <h3>Citizenship Distribution</h3>
    <canvas id="citizenChart"></canvas>
  </div>
</div>

</section>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const sb = supabase.createClient(
"https://yxkospvcqkoxiravjtqd.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4a29zcHZjcWtveGlyYXZqdHFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODEyNzEsImV4cCI6MjA5MTg1NzI3MX0.Aaw6wfcXf21uwgMQJWtiVN_vxqaqevEQerx2GjOG-Jc"
);
  
/* ===== SERVICES (locked) ===== */
const SERVICES = [
 {id:"SM",name:"Sports Massage",price:45},
 {id:"RCB",name:"Recovery Compression Boots",price:25},
 {id:"AS",name:"Assisted Stretch Session",price:20},
 {id:"PB",name:"Physio Bundle",price:400},
 {id:"PKP",name:"Performance Kickstart Program",price:261},
 {id:"SMFT",name:"Sports Massage - First Trial",price:189}
];
const getServiceName = id => SERVICES.find(s=>s.id===id)?.name || id;

/* ===== AGE RANGES (UI ONLY) ===== */
let ageRanges = [
  {label:"<18",min:0,max:17},
  {label:"18–29",min:18,max:29},
  {label:"30–39",min:30,max:39},
  {label:"40–49",min:40,max:49},
  {label:"50+",min:50,max:200}
];

function renderAgeRangeConfig(){
  ageRangeConfig.innerHTML="";
  ageRanges.forEach((r,i)=>{
    ageRangeConfig.innerHTML+=`
      <div style="display:flex;gap:10px;margin-bottom:6px">
        <input value="${r.label}" onchange="ageRanges[${i}].label=this.value">
        <input type="number" value="${r.min}" onchange="ageRanges[${i}].min=+this.value">
        <input type="number" value="${r.max}" onchange="ageRanges[${i}].max=+this.value">
        <button class="danger" onclick="removeAge(${i})">X</button>
      </div>`;
  });
}
window.removeAge = i => { ageRanges.splice(i,1); renderAgeRangeConfig(); };
addAgeRangeBtn.onclick = () => {
  ageRanges.push({label:"New",min:0,max:0});
  renderAgeRangeConfig();
};

/* ===== REPORT LOGIC ===== */
applyReportBtn.onclick = () => loadReport();

async function loadReport(){
  const {data:apps} = await sb.from("appointments").select("*");
  const {data:clients} = await sb.from("clients").select("*");

  let rows = apps || [];

  if(reportFrom.value) rows = rows.filter(r=>new Date(r.start_time)>=new Date(reportFrom.value));
  if(reportTo.value) rows = rows.filter(r=>new Date(r.start_time)<=new Date(reportTo.value));

  let serviceMap={},timeMap={},ageMap={},citizenMap={Malaysian:0,Foreigner:0};
  ageRanges.forEach(r=>ageMap[r.label]=0);

  let total=0,sst=0;

  rows.forEach(a=>{
    total+=Number(a.total||0);
    sst+=Number(a.sst||0);

    const s=getServiceName(a.service_id);
    serviceMap[s]=(serviceMap[s]||0)+Number(a.total||0);

    const k=reportMode.value==="monthly"?a.start_time.slice(0,7):a.start_time.slice(0,10);
    timeMap[k]=(timeMap[k]||0)+Number(a.total||0);

    const c=clients.find(x=>x.id===a.client_id);
    if(c){
      citizenMap[c.citizenship]++;
      const age=Math.floor((Date.now()-new Date(c.date_of_birth))/31557600000);
      const r=ageRanges.find(r=>age>=r.min&&age<=r.max);
      if(r) ageMap[r.label]++;
    }
  });

  totalSales.textContent=total.toFixed(2);
  totalSST.textContent=sst.toFixed(2);

  new Chart(serviceChart,{type:"bar",data:{labels:Object.keys(serviceMap),datasets:[{data:Object.values(serviceMap),backgroundColor:"#ff7a00"}]}});
  new Chart(timeChart,{type:"bar",data:{labels:Object.keys(timeMap),datasets:[{data:Object.values(timeMap),backgroundColor:"#673ab7"}]}});
  new Chart(ageChart,{type:"pie",data:{labels:Object.keys(ageMap),datasets:[{data:Object.values(ageMap)}]}});
  new Chart(citizenChart,{type:"pie",data:{labels:Object.keys(citizenMap),datasets:[{data:Object.values(citizenMap)}]}});

  window._excelData={rows,serviceMap,timeMap,ageMap,citizenMap,total,sst};
}

/* ===== EXCEL EXPORT (MULTI‑SHEET) ===== */
exportExcelBtn.onclick = ()=>{
  const wb=XLSX.utils.book_new();
  const d=window._excelData;

  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet([{TotalSales:d.total,TotalSST:d.sst}]),"Summary");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(d.rows),"Details");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(Object.entries(d.serviceMap).map(([k,v])=>({Service:k,Sales:v}))),"By Service");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(Object.entries(d.timeMap).map(([k,v])=>({Period:k,Sales:v}))),"By Date");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(Object.entries(d.ageMap).map(([k,v])=>({AgeRange:k,Count:v}))),"Age Range");
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(Object.entries(d.citizenMap).map(([k,v])=>({Citizenship:k,Count:v}))),"Citizenship");

  XLSX.writeFile(wb,"sales_report.xlsx");
};

/* ===== TAB ===== */
function show(tab){
  document.getElementById("reportsTab").classList.toggle("hidden",tab!=="reports");
  document.querySelectorAll("header button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab"+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add("active");
  if(tab==="reports"){renderAgeRangeConfig();loadReport();}
}
tabReports.onclick=()=>show("reports");

});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #f4f4f4;
      color: #111;
    }
    header {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      background: #111;
    }
    header button {
      background: #333;
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
    }
    header button.active {
      background: #ff7a00;
      color: #000;
      font-weight: 700;
    }
    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }
    .hidden { display: none; }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-top: 10px;
    }
    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
    }
    button.primary {
      background: #ff7a00;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 12px;
    }
    button.danger {
      background: #e74c3c;
      color: #fff;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      padding: 8px;
      border-bottom: 1px solid #ddd;
      font-size: 13px;
    }
    th { background: #f0f0f0; }
  </style>
</head>

<body>

<header>
  <button id="tabClients" class="active">Clients</button>
  <button id="tabPractitioners">Practitioners</button>
  <button id="tabAppointments">Appointments</button>
</header>

<div class="container">

<!-- CLIENTS -->
<section id="clientsTab">
  <div class="card">
    <h3>Add Client</h3>
    <label>Name</label><input id="c_name">
    <label>DOB</label><input type="date" id="c_dob">
    <label>Gender</label>
    <select id="c_gender"><option>Male</option><option>Female</option></select>
    <label>Citizenship</label>
    <select id="c_citizenship"><option>Malaysian</option><option>Foreigner</option></select>
    <label>Contact</label><input id="c_contact">
    <label>Email</label><input id="c_email">
    <label>IC / Passport</label><input id="c_ic">
    <button class="primary" id="addClientBtn">Add Client</button>
  </div>

  <div class="card">
    <h3>Client List</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th><th>DOB</th><th>Citizen</th>
          <th>Contact</th><th>Email</th><th>IC</th><th>Delete</th>
        </tr>
      </thead>
      <tbody id="clientsTable"></tbody>
    </table>
  </div>
</section>

<!-- PRACTITIONERS -->
<section id="practitionersTab" class="hidden">
  <div class="card">
    <h3>Add Practitioner</h3>
    <input id="p_name">
    <button class="primary" id="addPractitionerBtn">Add Practitioner</button>
  </div>

  <div class="card">
    <h3>Practitioners</h3>
    <table>
      <thead>
        <tr><th>Name</th><th>Remove</th></tr>
      </thead>
      <tbody id="practitionerTable"></tbody>
    </table>
  </div>
</section>

<!-- APPOINTMENTS -->
<section id="appointmentsTab" class="hidden">
  <div class="card">
    <h3>Add Appointment</h3>
    <label>Date</label><input type="date" id="a_date">
    <label>Time</label><input type="time" id="a_time">
    <label>Client</label><select id="a_client"></select>
    <label>Service</label>
    <select id="a_service">
      <option value="SM">Sports Massage</option>
      <option value="PB">Physio Bundle</option>
      <option value="PKP">Performance Kickstart Program</option>
    </select>
    <label>Amount (RM)</label><input id="a_amount" readonly>
    <label>Notes</label><textarea id="a_notes"></textarea>
    <button class="primary" id="addAppointmentBtn">Save Appointment</button>
  </div>

  <div class="card">
    <h3>Appointments</h3>
    <table>
      <thead>
        <tr>
          <th>Date</th><th>Time</th><th>Client</th>
          <th>Service</th><th>Amount</th>
        </tr>
      </thead>
      <tbody id="appointmentsTable"></tbody>
    </table>
  </div>
</section>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const sb = supabase.createClient(
"https://yxkospvcqkoxiravjtqd.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4a29zcHZjcWtveGlyYXZqdHFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODEyNzEsImV4cCI6MjA5MTg1NzI3MX0.Aaw6wfcXf21uwgMQJWtiVN_vxqaqevEQerx2GjOG-Jc"
);

  const clientsTab = document.getElementById("clientsTab");
  const practitionersTab = document.getElementById("practitionersTab");
  const appointmentsTab = document.getElementById("appointmentsTab");

  function showTab(tab) {
    clientsTab.classList.add("hidden");
    practitionersTab.classList.add("hidden");
    appointmentsTab.classList.add("hidden");
    document.getElementById(tab + "Tab").classList.remove("hidden");
    document.querySelectorAll("header button").forEach(b => b.classList.remove("active"));
    document.getElementById("tab" + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add("active");
  }

  tabClients.onclick = () => showTab("clients");
  tabPractitioners.onclick = () => showTab("practitioners");
  tabAppointments.onclick = () => showTab("appointments");

  async function loadClients() {
    const { data } = await sb.from("clients").select("*");
    clientsTable.innerHTML = "";
    a_client.innerHTML = "";
    data.forEach(c => {
      clientsTable.innerHTML += `
        <tr>
          <td>${c.full_name}</td>
          <td>${c.date_of_birth}</td>
          <td>${c.citizenship}</td>
          <td>${c.contact || ""}</td>
          <td>${c.email || ""}</td>
          <td>${c.ic_passport || ""}</td>
          <td><button class="danger" onclick="deleteClient('${c.id}')">X</button></td>
        </tr>`;
      a_client.innerHTML += `<option value="${c.id}">${c.full_name}</option>`;
    });
  }

  addClientBtn.onclick = async () => {
    await sb.from("clients").insert({
      full_name: c_name.value,
      date_of_birth: c_dob.value,
      gender: c_gender.value,
      citizenship: c_citizenship.value,
      contact: c_contact.value,
      email: c_email.value,
      ic_passport: c_ic.value
    });
    loadClients();
  };

  window.deleteClient = async (id) => {
    await sb.from("clients").delete().eq("id", id);
    loadClients();
  };

  async function loadPractitioners() {
    const { data } = await sb.from("practitioners").select("*");
    practitionerTable.innerHTML = "";
    data.forEach(p => {
      practitionerTable.innerHTML += `
        <tr>
          <td>${p.name}</td>
          <td><button class="danger" onclick="deletePractitioner('${p.id}')">X</button></td>
        </tr>`;
    });
  }

  addPractitionerBtn.onclick = async () => {
    await sb.from("practitioners").insert({ name: p_name.value });
    p_name.value = "";
    loadPractitioners();
  };

  window.deletePractitioner = async (id) => {
    await sb.from("practitioners").delete().eq("id", id);
    loadPractitioners();
  };

  addAppointmentBtn.onclick = async () => {
    await sb.from("appointments").insert({
      client_id: a_client.value,
      service_id: a_service.value,
      start_time: `${a_date.value}T${a_time.value}:00Z`,
      end_time: `${a_date.value}T${a_time.value}:00Z`,
      remarks: a_notes.value,
      amount: a_service.value === "SM" ? 45 : a_service.value === "PB" ? 400 : 261
    });
    loadAppointments();
  };

  async function loadAppointments() {
    const { data } = await sb.from("appointments").select("*").order("start_time");
    appointmentsTable.innerHTML = "";
    data.forEach(a => {
      appointmentsTable.innerHTML += `
        <tr>
          <td>${a.start_time.split("T")[0]}</td>
          <td>${a.start_time.split("T")[1].slice(0,5)}</td>
          <td>${a.client_id}</td>
          <td>${a.service_id}</td>
          <td>RM ${a.amount}</td>
        </tr>`;
    });
  }

  await loadClients();
  await loadPractitioners();
  await loadAppointments();

});
</script>

</body>
</html>

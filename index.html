<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <!-- Google Font -->
  <link rel="preconnect" href="  https://fonts.gstatic.com
  <ttps://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap

  <!-- Supabase SDK (v2) -->
  https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #f4f4f4;
      color: #111;
    }
  </style>
</head>

<body>

<header>
  <button id="tabClients" class="active">Clients</button>
  <button id="tabPractitioners">Practitioners</button>
  <button id="tabAppointments">Appointments</button>
</header>

<div class="container">

<!-- CLIENTS -->
<section id="clientsTab">
  <div class="card">
    <h3>Add Client</h3>
    <label>Name</label><input id="c_name">
    <label>DOB</label><input type="date" id="c_dob">
    <label>Gender</label>
    <select id="c_gender"><option>Male</option><option>Female</option></select>
    <label>Citizenship</label>
    <select id="c_citizen"><option>Malaysian</option><option>Foreigner</option></select>
    <label>Contact</label><input id="c_contact">
    <label>Email</label><input id="c_email">
    <label>IC / Passport</label><input id="c_ic">
    <button class="primary" id="addClientBtn">Add Client</button>
  </div>

  <div class="card">
    <h3>Client List</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th><th>DOB</th><th>Age</th><th>Citizen</th>
          <th>Contact</th><th>Email</th><th>IC</th><th>Delete</th>
        </tr>
      </thead>
      <tbody id="clientsTable"></tbody>
    </table>
  </div>
</section>

<!-- PRACTITIONERS (LOCKED) -->
<section id="practitionersTab" class="hidden">
  <div class="card">
    <h3>Add Practitioner</h3>
    <input id="p_name">
    <button class="primary" id="addPractitionerBtn">Add Practitioner</button>
  </div>

  <div class="card">
    <h3>Practitioners On Duty</h3>
    <label>Date</label><input type="date" id="dutyDate">
    <table>
      <thead><tr><th>Name</th><th>On Duty</th><th>Remove</th></tr></thead>
      <tbody id="practitionerTable"></tbody>
    </table>
    <button class="primary" id="saveDutyBtn">Save Duty</button>
  </div>
</section>

<!-- APPOINTMENTS -->
<section id="appointmentsTab" class="hidden">
  <div class="card">
    <h3>Add Appointment</h3>
    <label>Date</label><input type="date" id="appDate">
    <label>Client</label><select id="appClient"></select>
    <label>Service</label><select id="appService"></select>
    <label>Base Price (RM)</label><input id="appPrice" readonly>
    <label>SST 6% (RM)</label><input id="appSst" readonly>
    <label>Total (RM)</label><input id="appTotal" readonly>
    <label>Time (HH:mm)</label><input id="appTime">
    <label>Practitioner</label><select id="appPractitioner"></select>
    <label>Notes</label><textarea id="appNotes"></textarea>
    <button class="primary" id="saveAppointmentBtn">Save Appointment</button>
  </div>

  <div class="card">
    <h3>Appointment List</h3>
    <table>
      <thead>
        <tr>
          <th>Date</th><th>Time</th><th>Client</th><th>Service</th><th>Total</th><th>Practitioner</th>
        </tr>
      </thead>
      <tbody id="appointmentsTable"></tbody>
    </table>
  </div>
</section>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const sb = supabase.createClient(
"https://yxkospvcqkoxiravjtqd.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4a29zcHZjcWtveGlyYXZqdHFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODEyNzEsImV4cCI6MjA5MTg1NzI3MX0.Aaw6wfcXf21uwgMQJWtiVN_vxqaqevEQerx2GjOG-Jc"
);

  const SERVICES = [
    { id:"SM", name:"Sports Massage", price:45, duration:15 },
    { id:"RCB", name:"Recovery Compression Boots", price:25, duration:10 },
    { id:"AS", name:"Assisted Stretch Session", price:20, duration:10 },
    { id:"PB", name:"Physio Bundle", price:400, duration:0 },
    { id:"PKP", name:"Performance Kickstart Program", price:261, duration:0 },
    { id:"SMFT", name:"Sports Massage - First Trial", price:189, duration:0 }
  ];

  let clientsCache = [];

  /* ---------- Tabs ---------- */
  const tabs = {
    clients: document.getElementById("clientsTab"),
    practitioners: document.getElementById("practitionersTab"),
    appointments: document.getElementById("appointmentsTab")
  };

  document.getElementById("tabClients").addEventListener("click", () => showTab("clients"));
  document.getElementById("tabPractitioners").addEventListener("click", () => showTab("practitioners"));
  document.getElementById("tabAppointments").addEventListener("click", () => showTab("appointments"));

  function showTab(t){
    Object.values(tabs).forEach(x => x.classList.add("hidden"));
    tabs[t].classList.remove("hidden");

    ["tabClients","tabPractitioners","tabAppointments"].forEach(id => {
      document.getElementById(id).classList.remove("active");
    });

    document.getElementById("tab"+t.charAt(0).toUpperCase()+t.slice(1)).classList.add("active");

    if(t==="appointments") loadOnDuty();
  }

  /* ---------- Helpers ---------- */
  const ageFromDOB = d => {
    const dob=new Date(d), now=new Date();
    let age=now.getFullYear()-dob.getFullYear();
    if(now<new Date(now.getFullYear(),dob.getMonth(),dob.getDate())) age--;
    return age;
  };

  /* ---------- Clients ---------- */
  document.getElementById("addClientBtn").onclick = async () => {
    if(c_citizen.value==="Malaysian" && !/^\d{12}$/.test(c_ic.value)){
      alert("Malaysian IC must be 12 digits"); return;
    }
    await sb.from("clients").insert({
      full_name:c_name.value, date_of_birth:c_dob.value,
      gender:c_gender.value, citizenship:c_citizen.value,
      contact:c_contact.value, email:c_email.value, ic_passport:c_ic.value
    });
    loadClients();
  };

  async function loadClients(){
    const { data } = await sb.from("clients").select("*");
    clientsCache = data || [];
    clientsTable.innerHTML=""; appClient.innerHTML="";
    clientsCache.forEach(c=>{
      clientsTable.innerHTML+=`
        <tr>
          <td>${c.full_name}</td>
          <td>${c.date_of_birth}</td>
          <td>${ageFromDOB(c.date_of_birth)}</td>
          <td>${c.citizenship}</td>
          <td>${c.contact||""}</td>
          <td>${c.email||""}</td>
          <td>${c.ic_passport}</td>
          <td><button class="danger" onclick="deleteClient('${c.id}')">X</button></td>
        </tr>`;
      appClient.innerHTML+=`<option value="${c.id}">${c.full_name}</option>`;
    });
  }

  window.deleteClient = async id => {
    if(confirm("Delete client?")){
      await sb.from("clients").delete().eq("id",id);
      loadClients();
    }
  };

  /* ---------- Practitioners (LOCKED) ---------- */
  document.getElementById("addPractitionerBtn").onclick = async () => {
    await sb.from("practitioners").insert({ name:p_name.value });
    p_name.value=""; loadPractitioners();
  };

  async function loadPractitioners(){
    const { data } = await sb.from("practitioners").select("*").eq("active",true);
    practitionerTable.innerHTML="";
    data.forEach(p=>{
      practitionerTable.innerHTML+=`
        <tr>
          <td>${p.name}</td>
          <td><input type="checkbox" value="${p.id}"></td>
          <td><button class="danger" onclick="removePractitioner('${p.id}')">X</button></td>
        </tr>`;
    });
  }

  window.removePractitioner = async id => {
    await sb.from("practitioners").update({active:false}).eq("id",id);
    loadPractitioners();
  };

  document.getElementById("saveDutyBtn").onclick = async () => {
    await sb.from("practitioner_duty").delete().eq("duty_date",dutyDate.value);
    const rows=[];
    document.querySelectorAll("#practitionerTable input:checked").forEach(cb=>{
      rows.push({ practitioner_id:cb.value, duty_date:dutyDate.value, on_duty:true });
    });
    if(rows.length) await sb.from("practitioner_duty").insert(rows);
    alert("Duty saved");
  };

  /* ---------- Appointments ---------- */
  SERVICES.forEach(s=>{
    const o=document.createElement("option");
    o.value=s.id; o.textContent=s.name;
    appService.appendChild(o);
  });

  function recalc(){
    const svc=SERVICES.find(s=>s.id===appService.value);
    const client=clientsCache.find(c=>c.id===appClient.value);
    if(!svc||!client) return;
    const sst = client.citizenship==="Foreigner" ? +(svc.price*0.06).toFixed(2) : 0;
    appPrice.value=svc.price.toFixed(2);
    appSst.value=sst.toFixed(2);
    appTotal.value=(svc.price+sst).toFixed(2);
  }

  appService.onchange=recalc;
  appClient.onchange=recalc;

  async function loadOnDuty(){
    appPractitioner.innerHTML="";
    const { data } = await sb.from("practitioner_duty")
      .select("practitioner_id, practitioners(name)")
      .eq("duty_date",appDate.value)
      .eq("on_duty",true);

    if(!data?.length){
      appPractitioner.innerHTML="<option disabled>No practitioner on duty</option>";
      return;
    }
    data.forEach(d=>{
      appPractitioner.innerHTML+=`<option>${d.practitioners.name}</option>`;
    });
  }

  document.getElementById("saveAppointmentBtn").onclick = async () => {
    const client=clientsCache.find(c=>c.id===appClient.value);
    const svc=SERVICES.find(s=>s.id===appService.value);
    if(!client||!svc||!appTime.value||!appPractitioner.value){
      alert("Fill all required fields"); return;
    }
    const start=new Date(`${appDate.value}T${appTime.value}:00`);
    const end=new Date(start); end.setMinutes(start.getMinutes()+svc.duration);
    const sst=client.citizenship==="Foreigner"?+(svc.price*0.06).toFixed(2):0;
    const total=+(svc.price+sst).toFixed(2);

    await sb.from("appointments").insert({
      client_id:client.id, service_id:svc.id,
      start_time:start.toISOString(),
      end_time:end.toISOString(),
      practitioner:appPractitioner.value,
      remarks:appNotes.value,
      amount:svc.price, sst, total
    });

    loadAppointments();
  };

  async function loadAppointments(){
    const { data } = await sb.from("appointments").select("*").order("start_time");
    appointmentsTable.innerHTML="";
    data.forEach(a=>{
      const svcName=SERVICES.find(s=>s.id===a.service_id)?.name||a.service_id;
      const cname=clientsCache.find(c=>c.id===a.client_id)?.full_name||a.client_id;
      appointmentsTable.innerHTML+=`
        <tr>
          <td>${a.start_time.split("T")[0]}</td>
          <td>${a.start_time.split("T")[1].slice(0,5)}</td>
          <td>${cname}</td>
          <td>${svcName}</td>
          <td>RM ${Number(a.total).toFixed(2)}</td>
          <td>${a.practitioner||""}</td>
        </tr>`;
    });
  }

  /* ---------- Init ---------- */
  const today=new Date().toISOString().slice(0,10);
  dutyDate.value=today; appDate.value=today;
  loadClients(); loadPractitioners(); loadAppointments();

});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.comink href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"se -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/s/script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Excel -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { margin:0; font-family:Montserrat; background:#f4f4f4 }
header { display:flex; gap:10px; padding:12px; background:#111 }
header button { background:#333; color:#fff; border:none; padding:8px 14px; border-radius:6px; cursor:pointer }
header button.active { background:#ff7a00; color:#000; font-weight:700 }
.container { max-width:1200px; margin:auto; padding:20px }
.hidden { display:none }
.card { background:#fff; padding:16px; border-radius:8px; margin-bottom:20px }
label { font-size:12px; font-weight:600; display:block; margin-top:10px }
input,select { width:100%; padding:8px; margin-top:4px }
button.primary { margin-top:12px; background:#ff7a00; border:none; padding:8px 14px; border-radius:6px; cursor:pointer }
table { width:100%; border-collapse:collapse; margin-top:10px }
th,td { padding:8px; border-bottom:1px solid #ddd; font-size:13px }
th { background:#f0f0f0 }
</style>
</head>

<body>

<header>
  <button id="tabClients" class="active">Clients</button>
  <button id="tabPractitioners">Practitioners</button>
  <button id="tabAppointments">Appointments</button>
  <button id="tabReports">Sales Report</button>
</header>

<div class="container">

<!-- CLIENTS -->
<section id="clientsTab">
  <div class="card">
    <h3>Client List</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>DOB</th>
          <th>Age</th>
          <th>Gender</th>
          <th>Citizenship</th>
        </tr>
      </thead>
      <tbody id="clientsTable"></tbody>
    </table>
  </div>
</section>

<!-- PRACTITIONERS (unchanged placeholder) -->
<section id="practitionersTab" class="hidden">
  <div class="card">
    <h3>Practitioners</h3>
    <p>(unchanged – existing logic continues)</p>
  </div>
</section>

<!-- APPOINTMENTS (unchanged placeholder) -->
<section id="appointmentsTab" class="hidden">
  <div class="card">
    <h3>Appointments</h3>
    <p>(unchanged – existing logic continues)</p>
  </div>
</section>

<!-- SALES REPORT -->
<section id="reportsTab" class="hidden">

<div class="card">
  <h3>Filters</h3>
  <label>From Date</label>
  <input type="date" id="reportFrom">
  <label>To Date</label>
  <input type="date" id="reportTo">
  <label>Breakdown</label>
  <select id="reportMode">
    <option value="daily">Daily</option>
    <option value="monthly">Monthly</option>
  </select>
  <button class="primary" id="applyReportBtn">Apply</button>
  <button class="primary" id="exportExcelBtn">Export Excel</button>
</div>

<div class="card" style="background:#E3F2FD">
  <h3>Total Sales</h3>
  <h2>RM <span id="totalSales">0.00</span></h2>
</div>

<div class="card" style="background:#FFF3E0">
  <h3>Total SST</h3>
  <h2>RM <span id="totalSST">0.00</span></h2>
</div>

<div class="card">
  <h3>Sales by Service</h3>
  <canvas id="serviceChart"></canvas>
</div>

</section>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const sb = supabase.createClient(
"https://yxkospvcqkoxiravjtqd.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4a29zcHZjcWtveGlyYXZqdHFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODEyNzEsImV4cCI6MjA5MTg1NzI3MX0.Aaw6wfcXf21uwgMQJWtiVN_vxqaqevEQerx2GjOG-Jc"
);

const SERVICES = [
 {id:"SM", name:"Sports Massage"},
 {id:"RCB", name:"Recovery Compression Boots"},
 {id:"AS", name:"Assisted Stretch Session"},
 {id:"PB", name:"Physio Bundle"},
 {id:"PKP", name:"Performance Kickstart Program"},
 {id:"SMFT", name:"Sports Massage - First Trial"}
];

const getAge = dob =>
  Math.floor((Date.now() - new Date(dob)) / 31557600000);

/* ----- LOAD CLIENTS (RESTORE AGE) ----- */
async function loadClients() {
  const { data } = await sb.from("clients").select("*");
  clientsTable.innerHTML = "";
  data.forEach(c => {
    clientsTable.innerHTML += `
      <tr>
        <td>${c.full_name}</td>
        <td>${c.date_of_birth}</td>
        <td>${getAge(c.date_of_birth)}</td>
        <td>${c.gender}</td>
        <td>${c.citizenship}</td>
      </tr>`;
  });
}

/* ----- SALES REPORT ----- */
let serviceChart;

applyReportBtn.onclick = () => loadReport();

async function loadReport() {
  const { data } = await sb.from("appointments").select("*");
  const serviceMap = {};
  let total = 0;
  let sst = 0;

  data.forEach(a => {
    total += Number(a.total || 0);
    sst += Number(a.sst || 0);

    const name =
      SERVICES.find(s => s.id === a.service_id)?.name || a.service_id;

    serviceMap[name] = (serviceMap[name] || 0) + Number(a.total || 0);
  });

  totalSales.textContent = total.toFixed(2);
  totalSST.textContent = sst.toFixed(2);

  if (serviceChart) serviceChart.destroy();
  serviceChart = new Chart(serviceChartEl, {
    type: "bar",
    data: {
      labels: Object.keys(serviceMap),
      datasets: [{
        data: Object.values(serviceMap),
        backgroundColor: "#ff7a00"
      }]
    }
  });
}

/* EXPORT */
exportExcelBtn.onclick = async () => {
  const { data } = await sb.from("appointments").select("*");
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Sales");
  XLSX.writeFile(wb, "sales_report.xlsx");
};

/* TABS */
function show(tab) {
  ["clients","practitioners","appointments","reports"].forEach(t => {
    document.getElementById(t+"Tab").classList.toggle("hidden", t !== tab);
    document.getElementById("tab"+t.charAt(0).toUpperCase()+t.slice(1))
      .classList.toggle("active", t === tab);
  });
}

tabClients.onclick = () => show("clients");
tabPractitioners.onclick = () => show("practitioners");
tabAppointments.onclick = () => show("appointments");
tabReports.onclick = () => { show("reports"); loadReport(); };

loadClients();

});
</script>

</body>
</html>

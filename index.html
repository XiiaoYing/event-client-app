<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #f4f4f4;
  color: #111;
}

/* ===== TOP NAV ===== */
header {
  display: flex;
  gap: 12px;
  padding: 14px 20px;
  background: #121212;
}

header button {
  background: #2a2a2a;
  color: #fff;
  border: none;
  padding: 10px 18px;
  border-radius: 6px;
  cursor: pointer;
}

header button.active {
  background: #ff7a00;
  color: #000;
  font-weight: 700;
}

/* ===== LAYOUT ===== */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 24px;
}

.hidden { display: none; }

/* ===== CARD ===== */
.card {
  background: #fff;
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 20px;
}

/* ===== FORM ===== */
label {
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 4px;
  display: block;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  margin-bottom: 12px;
}

button.primary {
  background: #ff7a00;
  color: #000;
  border: none;
  padding: 10px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
}

button.secondary {
  background: #666;
  color: #fff;
  border: none;
  padding: 10px 16px;
  border-radius: 6px;
  cursor: pointer;
  margin-left: 8px;
}

/* ===== TABLE ===== */
table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #f1f1f1;
  text-align: left;
  padding: 10px;
  font-size: 13px;
}

td {
  padding: 10px;
  border-top: 1px solid #ddd;
  font-size: 13px;
}

/* ===== ACTION BAR ===== */
.action-bar {
  margin-bottom: 16px;
}
</style>
</head>

<body>

<header>
  <button id="tabClients" class="active">Clients</button>
  <button id="tabPractitioners">Practitioners</button>
  <button id="tabAppointments">Appointments</button>
</header>

<div class="container">

<!-- CLIENTS -->
<section id="clientsTab">
  <div class="action-bar">
    <button class="primary" id="btnAddClient">+ Add Client</button>
  </div>

  <div class="card hidden" id="clientForm">
    <h3>Add Client</h3>

    <label>Name</label><input id="c_name">
    <label>DOB</label><input type="date" id="c_dob">
    <label>Gender</label>
    <select id="c_gender"><option>Male</option><option>Female</option></select>
    <label>Citizenship</label>
    <select id="c_citizen"><option>Malaysian</option><option>Foreigner</option></select>
    <label>Contact</label><input id="c_contact">
    <label>Email</label><input id="c_email">
    <label>IC</label><input id="c_ic">

    <button class="primary" id="saveClient">Save</button>
    <button class="secondary" id="cancelClient">Cancel</button>
  </div>

  <div class="card">
    <h3>Client List</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th><th>DOB</th><th>Gender</th>
          <th>Citizen</th><th>Contact</th><th>Email</th><th>IC</th>
        </tr>
      </thead>
      <tbody id="clientsTable"></tbody>
    </table>
  </div>
</section>

<!-- PRACTITIONERS -->
<section id="practitionersTab" class="hidden">
  <div class="card">
    <h3>Practitioners</h3>
    <label>Name</label>
    <input id="p_name">
    <button class="primary" id="addPractitioner">Add</button>
  </div>
</section>

<!-- APPOINTMENTS -->
<section id="appointmentsTab" class="hidden">
  <div class="action-bar">
    <button class="primary">+ Add Appointment</button>
  </div>
  <div class="card">
    <h3>Appointments</h3>
    <p>(Appointment flow verified next step)</p>
  </div>
</section>

</div>

<script>
/* SAFETY */
window.onerror = e => alert("JS error: " + e);

/* INIT SUPABASE */
const sb = supabase.createClient(
  "https://eookqiucuncovvxzdcml.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvb2txaXVjdW5jb3Z2eHpkY21sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTIwNDksImV4cCI6MjA5MTc2ODA0OX0.Bk9QU8CufXnyiavO35WWM3gj1GupNRBk3EJZx-tO9hU"
);

/* TAB LOGIC */
const tabs = {
  Clients: document.getElementById("clientsTab"),
  Practitioners: document.getElementById("practitionersTab"),
  Appointments: document.getElementById("appointmentsTab")
};

function activate(tab) {
  Object.values(tabs).forEach(t => t.classList.add("hidden"));
  tabs[tab].classList.remove("hidden");

  document.querySelectorAll("header button").forEach(b => b.classList.remove("active"));
  document.getElementById("tab" + tab).classList.add("active");
}

tabClients.onclick = () => activate("Clients");
tabPractitioners.onclick = () => activate("Practitioners");
tabAppointments.onclick = () => activate("Appointments");

/* CLIENT FORM TOGGLE */
btnAddClient.onclick = () => clientForm.classList.remove("hidden");
cancelClient.onclick = () => clientForm.classList.add("hidden");

/* LOAD CLIENTS */
async function loadClients(){
  const {data} = await sb.from("clients").select("*");
  clientsTable.innerHTML="";
  data.forEach(c=>{
    clientsTable.innerHTML += `
      <tr>
        <td>${c.full_name}</td>
        <td>${c.date_of_birth}</td>
        <td>${c.gender}</td>
        <td>${c.citizenship}</td>
        <td>${c.contact||""}</td>
        <td>${c.email||""}</td>
        <td>${c.ic_passport}</td>
      </tr>`;
  });
}
loadClients();
</script>

</body>
</html>

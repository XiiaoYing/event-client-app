<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #f4f4f4;
  color: #111;
}

header {
  display: flex;
  gap: 10px;
  padding: 12px 16px;
  background: #111;
}

header button {
  background: #333;
  color: #fff;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
}

header button.active {
  background: #ff7a00;
  color: #000;
  font-weight: 700;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.hidden { display: none; }

.card {
  background: #fff;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 20px;
}

label {
  font-size: 12px;
  font-weight: 600;
  display: block;
  margin-top: 10px;
}

input, select, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
}

button.primary {
  background: #ff7a00;
  color: #000;
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 12px;
}

button.danger {
  background: #e74c3c;
  color: #fff;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
  font-size: 13px;
}

th {
  background: #f0f0f0;
  text-align: left;
}
</style>
</head>

<body>

<header>
  <button id="tabClients" class="active">Clients</button>
  <button id="tabPractitioners">Practitioners</button>
  <button id="tabAppointments">Appointments</button>
</header>

<div class="container">

<!-- ================= CLIENTS ================= -->
<section id="clientsTab">

<div class="card">
<h3>Add Client</h3>

<label>Name</label><input id="c_name">
<label>DOB</label><input type="date" id="c_dob">
<label>Gender</label>
<select id="c_gender"><option>Male</option><option>Female</option></select>
<label>Citizenship</label>
<select id="c_citizen"><option>Malaysian</option><option>Foreigner</option></select>
<label>Contact</label><input id="c_contact">
<label>Email</label><input id="c_email">
<label>IC / Passport</label><input id="c_ic">

<button class="primary" onclick="addClient()">Add Client</button>
</div>

<div class="card">
<h3>Client List</h3>
<table>
<thead>
<tr>
<th>Name</th><th>DOB</th><th>Gender</th>
<th>Citizen</th><th>Contact</th><th>Email</th><th>IC</th>
</tr>
</thead>
<tbody id="clientsTable"></tbody>
</table>
</div>

</section>

<!-- ================= PRACTITIONERS ================= -->
<section id="practitionersTab" class="hidden">

<div class="card">
<h3>Add Practitioner</h3>
<label>Name</label>
<input id="p_name">
<button class="primary" onclick="addPractitioner()">Add Practitioner</button>
</div>

<div class="card">
<h3>Practitioners On Duty</h3>

<label>Date</label>
<input type="date" id="dutyDate">

<table>
<thead>
<tr><th>Name</th><th>On Duty</th><th>Remove</th></tr>
</thead>
<tbody id="practitionerTable"></tbody>
</table>

<button class="primary" onclick="saveDuty()">Save Duty</button>
</div>

</section>

<!-- ================= APPOINTMENTS ================= -->
<section id="appointmentsTab" class="hidden">
<div class="card">
<h3>Appointments</h3>
<p>Appointment flow will be verified next.</p>
</div>
</section>

</div>

<script>
/* ================= INIT ================= */
const sb = supabase.createClient(
  "https://eookqiucuncovvxzdcml.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvb2txaXVjdW5jb3Z2eHpkY21sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTIwNDksImV4cCI6MjA5MTc2ODA0OX0.Bk9QU8CufXnyiavO35WWM3gj1GupNRBk3EJZx-tO9hU"
);

/* ================= TABS ================= */
const clientsTab = document.getElementById("clientsTab");
const practitionersTab = document.getElementById("practitionersTab");
const appointmentsTab = document.getElementById("appointmentsTab");

tabClients.onclick = () => showTab("clients");
tabPractitioners.onclick = () => showTab("practitioners");
tabAppointments.onclick = () => showTab("appointments");

function showTab(tab) {
  clientsTab.classList.add("hidden");
  practitionersTab.classList.add("hidden");
  appointmentsTab.classList.add("hidden");

  tabClients.classList.remove("active");
  tabPractitioners.classList.remove("active");
  tabAppointments.classList.remove("active");

  if (tab === "clients") {
    clientsTab.classList.remove("hidden");
    tabClients.classList.add("active");
  }
  if (tab === "practitioners") {
    practitionersTab.classList.remove("hidden");
    tabPractitioners.classList.add("active");
  }
  if (tab === "appointments") {
    appointmentsTab.classList.remove("hidden");
    tabAppointments.classList.add("active");
  }
}

/* ================= CLIENTS ================= */
async function addClient() {
  if (c_citizen.value === "Malaysian" && !/^\d{12}$/.test(c_ic.value)) {
    alert("Malaysian IC must be exactly 12 digits");
    return;
  }

  await sb.from("clients").insert({
    full_name: c_name.value,
    date_of_birth: c_dob.value,
    gender: c_gender.value,
    citizenship: c_citizen.value,
    contact: c_contact.value,
    email: c_email.value,
    ic_passport: c_ic.value
  });

  loadClients();
}

async function loadClients() {
  const { data } = await sb.from("clients").select("*");
  clientsTable.innerHTML = "";
  data.forEach(c => {
    clientsTable.innerHTML += `
      <tr>
        <td>${c.full_name}</td>
        <td>${c.date_of_birth}</td>
        <td>${c.gender}</td>
        <td>${c.citizenship}</td>
        <td>${c.contact || ""}</td>
        <td>${c.email || ""}</td>
        <td>${c.ic_passport}</td>
      </tr>
    `;
  });
}

/* ================= PRACTITIONERS ================= */
async function addPractitioner() {
  if (!p_name.value) return;
  await sb.from("practitioners").insert({ name: p_name.value });
  p_name.value = "";
  loadPractitioners();
}

async function loadPractitioners() {
  const { data } = await sb.from("practitioners").select("*").eq("active", true);
  practitionerTable.innerHTML = "";
  data.forEach(p => {
    practitionerTable.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td><input type="checkbox" value="${p.id}"></td>
        <td><button class="danger" onclick="removePractitioner('${p.id}')">X</button></td>
      </tr>
    `;
  });
}

async function removePractitioner(id) {
  await sb.from("practitioners").update({ active: false }).eq("id", id);
  loadPractitioners();
}

async function saveDuty() {
  await sb.from("practitioner_duty").delete().eq("duty_date", dutyDate.value);

  const rows = [];
  document.querySelectorAll("#practitionerTable input:checked").forEach(cb => {
    rows.push({
      practitioner_id: cb.value,
      duty_date: dutyDate.value,
      on_duty: true
    });
  });

  if (rows.length) await sb.from("practitioner_duty").insert(rows);
  alert("Duty saved");
}

/* ================= INIT LOAD ================= */
const today = new Date().toISOString().slice(0,10);
dutyDate.value = today;

loadClients();
loadPractitioners();
</script>

</body>
</html>

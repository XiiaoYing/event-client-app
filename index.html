<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clickable Test</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap"
    rel="stylesheet"
  >

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #f4f4f4;
    }
    header {
      display: flex;
      gap: 10px;
      padding: 12px;
      background: #111;
    }
    header button {
      background: #333;
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
    }
    header button.active {
      background: #ff7a00;
      color: #000;
      font-weight: 600;
    }
    .container {
      padding: 20px;
    }
    .hidden {
      display: none;
    }
    .card {
      background: #fff;
      padding: 16px;
      border-radius: 8px;
      max-width: 400px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
    }
    button.primary {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      background: #ff7a00;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <button id="tabClients" class="active">Clients</button>
  <button id="tabPractitioners">Practitioners</button>
  <button id="tabAppointments">Appointments</button>
  <button id="tabReports">Sales Report</button>
</header>

<div class="container">

  <section id="clientsTab">
    <div class="card">
      <h3>Client Test</h3>
      <input id="clientName" placeholder="Client name">
      <button class="primary" id="saveBtn">Save Client</button>
    </div>
  </section>

  <section id="practitionersTab" class="hidden">
    <div class="card"><h3>Practitioners Tab</h3></div>
  </section>

  <section id="appointmentsTab" class="hidden">
    <div class="card"><h3>Appointments Tab</h3></div>
  </section>

  <section id="reportsTab" class="hidden">
    <div class="card"><h3>Sales Report Tab</h3></div>
  </section>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  console.log("✅ JS is running");

  function show(tab) {
    ["clients","practitioners","appointments","reports"].forEach(t => {
      document.getElementById(t+"Tab").classList.add("hidden");
      document.getElementById("tab"+t.charAt(0).toUpperCase()+t.slice(1))
        .classList.remove("active");
    });

    document.getElementById(tab+"Tab").classList.remove("hidden");
    document.getElementById("tab"+tab.charAt(0).toUpperCase()+tab.slice(1))
      .classList.add("active");
  }

  tabClients.onclick = () => show("clients");
  tabPractitioners.onclick = () => show("practitioners");
  tabAppointments.onclick = () => show("appointments");
  tabReports.onclick = () => show("reports");

  saveBtn.onclick = () => {
    alert("✅ Save button works. Name = " + clientName.value);
  };
});
</script>

</body>
</html>

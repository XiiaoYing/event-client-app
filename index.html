<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Click Test</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }
    header {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #111;
    }
    header button {
      background: #333;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
    }
    header button.active {
      background: orange;
      color: black;
    }
    .hidden {
      display: none;
    }
    .container {
      padding: 20px;
    }
    .card {
      background: white;
      padding: 16px;
      border-radius: 8px;
      max-width: 300px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
    }
    button.save {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      background: orange;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <button id="btnClients" class="active">Clients</button>
  <button id="btnPractitioners">Practitioners</button>
  <button id="btnAppointments">Appointments</button>
  <button id="btnReports">Sales Report</button>
</header>

<div class="container">
  <div id="clients" class="card">
    <h3>Client Test</h3>
    <input id="clientName" placeholder="Client name">
    <button class="save" id="saveClient">Save Client</button>
  </div>

  <div id="practitioners" class="card hidden"><h3>Practitioners Tab</h3></div>
  <div id="appointments" class="card hidden"><h3>Appointments Tab</h3></div>
  <div id="reports" class="card hidden"><h3>Sales Report Tab</h3></div>
</div>

<script>
console.log("✅ Script loaded");

function show(tab) {
  document.getElementById("clients").classList.add("hidden");
  document.getElementById("practitioners").classList.add("hidden");
  document.getElementById("appointments").classList.add("hidden");
  document.getElementById("reports").classList.add("hidden");

  document.getElementById("btnClients").classList.remove("active");
  document.getElementById("btnPractitioners").classList.remove("active");
  document.getElementById("btnAppointments").classList.remove("active");
  document.getElementById("btnReports").classList.remove("active");

  document.getElementById(tab).classList.remove("hidden");
  document.getElementById("btn" + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add("active");
}

btnClients.onclick = () => show("clients");
btnPractitioners.onclick = () => show("practitioners");
btnAppointments.onclick = () => show("appointments");
btnReports.onclick = () => show("reports");

saveClient.onclick = () => {
  alert("✅ Save works: " + clientName.value);
};
</script>

</body>
</html>

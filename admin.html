<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<!-- Supabase v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #0b0b0b;
  color: #ffffff;
}
header {
  display: flex;
  gap: 12px;
  padding: 16px;
  background: #000;
  border-bottom: 2px solid #ff7a00;
}
header button {
  background: #1f1f1f;
  color: #fff;
  border: none;
  padding: 10px 16px;
  border-radius: 6px;
  cursor: pointer;
}
header button.active {
  background: #ff7a00;
  color: #000;
  font-weight: 700;
}
.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}
.hidden { display: none; }

.card {
  background: #151515;
  padding: 16px;
  border-radius: 10px;
  margin-bottom: 20px;
}

label {
  font-size: 12px;
  color: #ffb366;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: none;
  margin-bottom: 10px;
}

button.primary {
  background: #ff7a00;
  color: #000;
  padding: 8px 14px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-weight: 600;
}
button.secondary {
  background: #666;
  color: #fff;
  padding: 8px 14px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}
button.danger {
  background: #ff4d4d;
  color: #fff;
  padding: 8px 14px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 10px;
  border-bottom: 1px solid #333;
  font-size: 13px;
}
th {
  background: #111;
  color: #ffb366;
}

.actions button { margin-right: 6px; }
</style>
</head>

<body>

<header>
  <button class="active" onclick="showTab('clients', this)">Clients</button>
  <button onclick="showTab('practitioners', this)">Practitioners</button>
  <button onclick="showTab('appointments', this)">Appointments</button>
</header>

<div class="container">

<!---------------- CLIENTS ---------------->
<div id="clientsTab">

<button class="primary" onclick="toggleClientForm()">➕ Add Client</button>

<div id="addClientForm" class="card hidden">
  <h3>Add Client</h3>

  <label>Name</label><input id="c_name">
  <label>DOB</label><input type="date" id="c_dob">
  <label>Gender</label>
  <select id="c_gender"><option>Male</option><option>Female</option></select>
  <label>Citizenship</label>
  <select id="c_citizen"><option>Malaysian</option><option>Foreigner</option></select>
  <label>Contact</label><input id="c_contact">
  <label>Email</label><input id="c_email">
  <label>IC / Passport</label><input id="c_ic">

  <button class="primary" onclick="submitClient()">Submit</button>
  <button class="secondary" onclick="toggleClientForm()">Cancel</button>
</div>

<div class="card">
<h3>Client List</h3>
<table>
<thead>
<tr>
<th>Name</th><th>DOB</th><th>Gender</th><th>Citizen</th>
<th>Contact</th><th>Email</th><th>IC</th><th>Action</th>
</tr>
</thead>
<tbody id="clientTable"></tbody>
</table>
</div>
</div>

<!---------------- PRACTITIONERS ---------------->
<div id="practitionersTab" class="hidden">

<div class="card">
<h3>Add Practitioner</h3>
<input id="p_name">
<button class="primary" onclick="addPractitioner()">Add</button>
</div>

<div class="card">
<h3>Practitioners On Duty</h3>
<label>Date</label><input type="date" id="dutyDate">
<table>
<thead><tr><th>Name</th><th>On Duty</th><th>Delete</th></tr></thead>
<tbody id="practitionerTable"></tbody>
</table>
<button class="primary" onclick="saveDuty()">Save Duty</button>
</div>

</div>

<!---------------- APPOINTMENTS ---------------->
<div id="appointmentsTab" class="hidden">

<div class="card">
<h3>New Appointment</h3>

<label>Date</label><input type="date" id="appDate">
<label>Client</label><select id="appClient"></select>
<label>Service</label><select id="appService"></select>
<label>Price</label><input id="appPrice" readonly>
<label>Time</label><input id="appTime" placeholder="HH:mm">
<label>Practitioner</label><select id="appPractitioner"></select>
<label>Notes</label><textarea id="appNotes"></textarea>

<button class="primary" onclick="saveAppointment()">Save</button>
<button class="secondary" onclick="resetAppointment()">Cancel</button>
</div>

<div class="card">
<h3>Appointments</h3>
<table>
<thead><tr><th>Time</th><th>Client</th><th>Service</th><th>Practitioner</th></tr></thead>
<tbody id="appointmentTable"></tbody>
</table>
</div>

</div>

</div>

<script>
window.onload = async () => {

const sb = supabase.createClient(
  "https://eookqiucuncovvxzdcml.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvb2txaXVjdW5jb3Z2eHpkY21sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTIwNDksImV4cCI6MjA5MTc2ODA0OX0.Bk9QU8CufXnyiavO35WWM3gj1GupNRBk3EJZx-tO9hU"
);

const SERVICES = [
  { name:"Sports Massage", price:45, duration:15 },
  { name:"Recovery Compression Boots", price:25, duration:10 },
  { name:"Assisted Stretch Session", price:20, duration:10 },
  { name:"Physio Bundle", price:400, duration:0 },
  { name:"Performance Kickstart Program", price:261, duration:0 },
  { name:"Sports Massage - First Trial", price:189, duration:0 }
];

let clients = [];

/* TAB SWITCH */
window.showTab = (tab, btn) => {
  ["clients","practitioners","appointments"].forEach(t=>{
    document.getElementById(t+"Tab").classList.add("hidden");
  });
  document.getElementById(tab+"Tab").classList.remove("hidden");
  document.querySelectorAll("header button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
};

/* CLIENTS */
window.toggleClientForm = () => {
  document.getElementById("addClientForm").classList.toggle("hidden");
};

window.submitClient = async () => {
  if (c_citizen.value === "Malaysian" && !/^\d{12}$/.test(c_ic.value)) {
    alert("Malaysian IC must be exactly 12 digits");
    return;
  }

  await sb.from("clients").insert({
    full_name: c_name.value,
    date_of_birth: c_dob.value,
    gender: c_gender.value,
    citizenship: c_citizen.value,
    contact: c_contact.value,
    email: c_email.value,
    ic_passport: c_ic.value
  });

  toggleClientForm();
  loadClients();
};

async function loadClients(){
  const {data} = await sb.from("clients").select("*");
  clients = data || [];
  clientTable.innerHTML = "";
  appClient.innerHTML = "";

  clients.forEach(c=>{
    clientTable.innerHTML += `
      <tr>
        <td>${c.full_name}</td>
        <td>${c.date_of_birth}</td>
        <td>${c.gender}</td>
        <td>${c.citizenship}</td>
        <td>${c.contact||""}</td>
        <td>${c.email||""}</td>
        <td>${c.ic_passport}</td>
        <td class="actions">
          <button class="danger" onclick="deleteClient('${c.id}')">Delete</button>
        </td>
      </tr>`;
    appClient.innerHTML += `<option value="${c.id}">${c.full_name}</option>`;
  });
}

window.deleteClient = async (id) => {
  if(confirm("Delete client?")){
    await sb.from("clients").delete().eq("id", id);
    loadClients();
  }
};

/* PRACTITIONERS */
async function loadPractitioners(){
  const {data} = await sb.from("practitioners").select("*").eq("active", true);
  practitionerTable.innerHTML = "";
  data.forEach(p=>{
    practitionerTable.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td><input type="checkbox" data-id="${p.id}"></td>
        <td><button class="danger" onclick="removePractitioner('${p.id}')">Delete</button></td>
      </tr>`;
  });
}

window.addPractitioner = async () => {
  await sb.from("practitioners").insert({ name: p_name.value });
  p_name.value = "";
  loadPractitioners();
};

window.removePractitioner = async (id) => {
  await sb.from("practitioners").update({ active:false }).eq("id", id);
  loadPractitioners();
};

window.saveDuty = async () => {
  await sb.from("practitioner_duty").delete().eq("duty_date", dutyDate.value);
  document.querySelectorAll("#practitionerTable input:checked").forEach(i=>{
    sb.from("practitioner_duty").insert({
      practitioner_id:i.dataset.id,
      duty_date:dutyDate.value,
      on_duty:true
    });
  });
};

/* APPOINTMENTS */
SERVICES.forEach(s=>appService.innerHTML+=`<option>${s.name}</option>`);
appService.onchange=()=>appPrice.value=SERVICES.find(s=>s.name===appService.value).price;

window.saveAppointment = async () => {
  alert("Appointment saved (review logic next)");
};

window.resetAppointment = ()=>{ appTime.value=""; appNotes.value=""; };

const today = new Date().toISOString().slice(0,10);
dutyDate.value = today;
appDate.value = today;
appPrice.value = SERVICES[0].price;

loadClients();
loadPractitioners();

};
</script>

</body>
</html>

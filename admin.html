<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin:0; font-family:Montserrat, sans-serif; background:#0b0b0b; color:#fff; }
header { display:flex; gap:10px; padding:16px; background:#000; }
header button { background:#1f1f1f; color:#fff; border:none; padding:10px 14px; border-radius:6px; cursor:pointer; }
header button.active { background:#ff7a00; color:#000; }
.container { max-width:1200px; margin:auto; padding:20px; }
.hidden { display:none; }

.card { background:#151515; padding:16px; margin-bottom:20px; border-radius:10px; }
label { font-size:12px; color:#ffb366; display:block; margin-top:8px; }
input, select, textarea {
  width:100%; padding:10px; border:none; border-radius:6px;
  background:#f2f2f2; color:#000;
}
button.primary { background:#ff7a00; color:#000; padding:8px 14px; border:none; border-radius:6px; cursor:pointer; }
button.secondary { background:#777; color:#fff; padding:8px 14px; border:none; border-radius:6px; cursor:pointer; }
button.danger { background:#ff4d4d; color:#fff; padding:8px 14px; border:none; border-radius:6px; cursor:pointer; }

table { width:100%; border-collapse:collapse; background:#1c1c1c; margin-top:10px; }
th, td { padding:10px; border-bottom:1px solid #333; font-size:13px; }
th { background:#111; color:#ffb366; }
</style>
</head>

<body>

<header>
  <button class="active" onclick="showTab('clients',this)">Clients</button>
  <button onclick="showTab('practitioners',this)">Practitioners</button>
  <button onclick="showTab('appointments',this)">Appointments</button>
</header>

<div class="container">

<!-- CLIENTS -->
<div id="clientsTab">

  <button class="primary" onclick="toggleClientForm()">➕ Add Client</button>

  <div id="addClientForm" class="card hidden">
    <h3>Add Client</h3>
    <label>Name</label><input id="c_name">
    <label>DOB</label><input type="date" id="c_dob">
    <label>Gender</label><select id="c_gender"><option>Male</option><option>Female</option></select>
    <label>Citizenship</label><select id="c_citizen"><option>Malaysian</option><option>Foreigner</option></select>
    <label>Contact</label><input id="c_contact">
    <label>Email</label><input id="c_email">
    <label>IC / Passport</label><input id="c_ic">
    <br><br>
    <button class="primary" onclick="submitClient()">Submit</button>
    <button class="secondary" onclick="toggleClientForm()">Cancel</button>
  </div>

  <div class="card">
    <h3>Client List</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th><th>DOB</th><th>Gender</th>
          <th>Citizen</th><th>Contact</th><th>Email</th><th>IC</th>
        </tr>
      </thead>
      <tbody id="clientTable"></tbody>
    </table>
  </div>

</div>

<!-- PRACTITIONERS -->
<div id="practitionersTab" class="hidden">

  <div class="card">
    <h3>Add Practitioner</h3>
    <input id="p_name">
    <button class="primary" onclick="addPractitioner()">Add</button>
  </div>

  <div class="card">
    <h3>Practitioners On Duty</h3>
    <label>Date</label><input type="date" id="dutyDate">
    <table>
      <thead><tr><th>Name</th><th>On Duty</th><th>Delete</th></tr></thead>
      <tbody id="practitionerTable"></tbody>
    </table>
    <br>
    <button class="primary" onclick="saveDuty()">Save Duty</button>
  </div>

</div>

<!-- APPOINTMENTS -->
<div id="appointmentsTab" class="hidden">

  <div class="card">
    <h3>New Appointment</h3>
    <label>Date</label><input type="date" id="appDate">
    <label>Client</label><select id="appClient"></select>
    <label>Service</label><select id="appService"></select>
    <label>Price (RM)</label><input id="appPrice" readonly>
    <label>Time</label><input id="appTime" placeholder="HH:mm">
    <label>Practitioner</label><select id="appPractitioner"></select>
    <label>Notes</label><textarea id="appNotes"></textarea>
    <label>Payment</label><select id="appPayment"><option>Cash</option><option>Card</option><option>E-wallet</option></select>
    <br><br>
    <button class="primary">Save</button>
    <button class="secondary" onclick="resetAppointment()">Cancel</button>
  </div>

  <div class="card">
    <h3>Appointments</h3>
    <table>
      <thead><tr><th>Time</th><th>Client</th><th>Service</th><th>Practitioner</th></tr></thead>
      <tbody id="appointmentTable"></tbody>
    </table>
  </div>

</div>

</div>

<script>
const sb = supabase.createClient("PASTE_SUPABASE_URL_HERE","PASTE_SUPABASE_ANON_KEY_HERE");

function showTab(tab,btn){
  ['clients','practitioners','appointments'].forEach(t=>document.getElementById(t+'Tab').classList.add('hidden'));
  document.getElementById(tab+'Tab').classList.remove('hidden');
  document.querySelectorAll('header button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleClientForm(){
  document.getElementById('addClientForm').classList.toggle('hidden');
}

function submitClient(){
  if(c_citizen.value==="Malaysian" && !/^\d{12}$/.test(c_ic.value)){
    alert("Malaysian IC must be 12 digits");
    return;
  }
  sb.from("clients").insert({
    full_name:c_name.value,
    date_of_birth:c_dob.value,
    gender:c_gender.value,
    citizenship:c_citizen.value,
    contact:c_contact.value,
    email:c_email.value,
    ic_passport:c_ic.value
  }).then(()=>{toggleClientForm();loadClients();});
}

async function loadClients(){
  const {data}=await sb.from("clients").select("*");
  clientTable.innerHTML="";
  appClient.innerHTML="";
  data.forEach(c=>{
    clientTable.innerHTML+=`
      <tr><td>${c.full_name}</td><td>${c.date_of_birth}</td>
      <td>${c.gender}</td><td>${c.citizenship}</td>
      <td>${c.contact||""}</td><td>${c.email||""}</td><td>${c.ic_passport}</td></tr>`;
    appClient.innerHTML+=`<option value="${c.id}">${c.full_name}</option>`;
  });
}

async function loadPractitioners(){
  const {data}=await sb.from("practitioners").select("*").eq("active",true);
  practitionerTable.innerHTML="";
  data.forEach(p=>{
    practitionerTable.innerHTML+=`
      <tr>
        <td>${p.name}</td>
        <td><input type="checkbox" data-id="${p.id}"></td>
        <td><button class="danger" onclick="removePractitioner('${p.id}')">Delete</button></td>
      </tr>`;
  });
}

function addPractitioner(){ sb.from("practitioners").insert({name:p_name.value}).then(loadPractitioners); }

function saveDuty(){ alert("Duty saved"); }

function removePractitioner(id){ sb.from("practitioners").update({active:false}).eq("id",id).then(loadPractitioners); }

loadClients(); loadPractitioners();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin:0; font-family:'Montserrat',sans-serif; background:#0b0b0b; color:#fff; }
header { display:flex; gap:10px; padding:16px; background:#000; border-bottom:2px solid #ff7a00; }
header button { background:#1f1f1f; color:#fff; border:none; padding:10px 14px; border-radius:6px; cursor:pointer; }
header button.active { background:#ff7a00; color:#000; font-weight:700; }
.container { max-width:1200px; margin:auto; padding:24px; }
.hidden { display:none; }

input, select, textarea {
  width:100%; padding:8px; background:#1f1f1f;
  border:none; border-radius:6px; color:#fff;
}

button.primary { background:#ff7a00; color:#000; padding:8px 12px; border:none; border-radius:6px; cursor:pointer; }
button.secondary { background:#666; color:#fff; padding:8px 12px; border:none; border-radius:6px; cursor:pointer; }
button.danger { background:#ff4d4d; color:#fff; padding:8px 12px; border:none; border-radius:6px; cursor:pointer; }

table { width:100%; border-collapse:collapse; background:#151515; margin-top:10px; }
th, td { padding:10px; border-bottom:1px solid #222; font-size:13px; }
th { background:#111; color:#ffb366; font-size:12px; }

.section { margin-top:20px; }
h2 { color:#ff7a00; }
</style>
</head>

<body>

<header>
  <button class="active" onclick="switchTab('clients', this)">Clients</button>
  <button onclick="switchTab('practitioners', this)">Practitioners</button>
  <button onclick="switchTab('appointments', this)">Appointments</button>
</header>

<div class="container">

<!-- CLIENTS -->
<div id="clientsTab">
  <h2>Clients</h2>

  <div class="section">
    <h3>Add Client</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <input id="c_name" placeholder="Full Name">
      <input id="c_dob" type="date">
      <select id="c_gender"><option>Male</option><option>Female</option></select>
      <select id="c_citizen"><option>Malaysian</option><option>Foreigner</option></select>
      <input id="c_contact" placeholder="Contact Number">
      <input id="c_email" placeholder="Email">
      <input id="c_ic" placeholder="IC / Passport">
    </div>
    <button class="primary" onclick="createClient()">Submit Client</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th><th>DOB</th><th>Age</th><th>Gender</th>
        <th>Citizenship</th><th>Contact</th><th>Email</th>
        <th>IC / Passport</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="clientsBody"></tbody>
  </table>
</div>

<!-- PRACTITIONERS -->
<div id="practitionersTab" class="hidden">
  <h2>Practitioners</h2>
  <input id="pracName" placeholder="Practitioner name">
  <button class="primary" onclick="addPractitioner()">Add Practitioner</button>

  <div class="section">
    <h3>On Duty</h3>
    <input type="date" id="dutyDate">
    <table>
      <thead><tr><th>Name</th><th>On Duty</th></tr></thead>
      <tbody id="dutyBody"></tbody>
    </table>
    <button class="primary" onclick="saveDuty()">Save Duty</button>
  </div>
</div>

<!-- APPOINTMENTS -->
<div id="appointmentsTab" class="hidden">
  <h2>New Appointment</h2>

  <input type="date" id="appDate">
  <select id="appClient"></select>
  <select id="appService"></select>
  <input id="appPrice" readonly>
  <input id="appTime" placeholder="HH:mm">
  <select id="appPractitioner"></select>
  <textarea id="appNotes" placeholder="Session Notes"></textarea>
  <select id="appPayment">
    <option>Cash</option>
    <option>Card</option>
    <option>E-wallet</option>
  </select>

  <div style="display:flex;gap:10px">
    <button class="primary" onclick="saveAppointment()">Save</button>
    <button class="secondary" onclick="resetAppointment()">Cancel</button>
  </div>
</div>

</div>

<script>
window.onload = () => {
  const sb = supabase.createClient(
    "https://eookqiucuncovvxzdcml.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvb2txaXVjdW5jb3Z2eHpkY21sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTIwNDksImV4cCI6MjA5MTc2ODA0OX0.Bk9QU8CufXnyiavO35WWM3gj1GupNRBk3EJZx-tO9hU"
  );

  const SERVICES = [
    { name:"Sports Massage", price:45, duration:15 },
    { name:"Recovery Compression Boots", price:25, duration:10 },
    { name:"Assisted Stretch Session", price:20, duration:10 }
  ];

  let clients=[], practitioners=[];

  window.switchTab = (tab, btn) => {
    ['clients','practitioners','appointments'].forEach(t => {
      document.getElementById(t+'Tab').classList.add('hidden');
    });
    document.getElementById(tab+'Tab').classList.remove('hidden');
    document.querySelectorAll('header button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if (tab === 'appointments') loadOnDuty();
  };

  async function loadClients(){
    const {data}=await sb.from("clients").select("*");
    clients=data||[];
    clientsBody.innerHTML="";
    appClient.innerHTML="";
    clients.forEach(c=>{
      const age=new Date().getFullYear()-new Date(c.date_of_birth).getFullYear();
      clientsBody.innerHTML+=`
        <tr>
          <td contenteditable>${c.full_name}</td>
          <td contenteditable>${c.date_of_birth}</td>
          <td>${age}</td>
          <td contenteditable>${c.gender}</td>
          <td contenteditable>${c.citizenship}</td>
          <td contenteditable>${c.contact||""}</td>
          <td contenteditable>${c.email||""}</td>
          <td contenteditable>${c.ic_passport}</td>
          <td><button class="danger" onclick="deleteClient('${c.id}')">Delete</button></td>
        </tr>`;
      appClient.innerHTML+=`<option value="${c.id}">${c.full_name}</option>`;
    });
  }

  window.createClient=async()=>{
    await sb.from("clients").insert({
      full_name:c_name.value,date_of_birth:c_dob.value,
      gender:c_gender.value,citizenship:c_citizen.value,
      contact:c_contact.value,email:c_email.value,
      ic_passport:c_ic.value
    });
    loadClients();
  };

  window.deleteClient=id=>{
    if(confirm("Delete client?")) sb.from("clients").delete().eq("id",id).then(loadClients);
  };

  async function loadPractitioners(){
    const {data}=await sb.from("practitioners").select("*").eq("active",true);
    practitioners=data||[]; renderDuty();
  }

  function renderDuty(){
    dutyBody.innerHTML="";
    practitioners.forEach(p=>{
      dutyBody.innerHTML+=`
        <tr><td>${p.name}</td>
        <td><input type="checkbox" data-id="${p.id}"></td></tr>`;
    });
  }

  window.addPractitioner=()=>{
    sb.from("practitioners").insert({name:pracName.value})
      .then(()=>{pracName.value="";loadPractitioners();});
  };

  window.saveDuty=async()=>{
    await sb.from("practitioner_duty").delete().eq("duty_date",dutyDate.value);
    document.querySelectorAll("#dutyBody input:checked").forEach(i=>{
      sb.from("practitioner_duty").insert({
        practitioner_id:i.dataset.id,duty_date:dutyDate.value,on_duty:true
      });
    });
  };

  SERVICES.forEach(s=>appService.innerHTML+=`<option>${s.name}</option>`);
  appService.onchange=()=>appPrice.value=SERVICES.find(s=>s.name===appService.value).price;

  async function loadOnDuty(){
    const {data}=await sb.from("practitioner_duty")
      .select("practitioners(name)").eq("duty_date",appDate.value);
    appPractitioner.innerHTML="";
    data.forEach(d=>appPractitioner.innerHTML+=`<option>${d.practitioners.name}</option>`);
  }

  window.saveAppointment=async()=>{
    const c=clients.find(x=>x.id===appClient.value);
    const s=SERVICES.find(x=>x.name===appService.value);
    const start=new Date(appDate.value+"T"+appTime.value);
    const end=new Date(start); end.setMinutes(start.getMinutes()+s.duration);
    const {data}=await sb.from("appointments").insert({
      client_id:c.id,service_name:s.name,
      start_time:start,end_time:end,
      practitioner:appPractitioner.value,
      remarks:appNotes.value
    }).select().single();
    const sst=c.citizenship==="Foreigner"?+(s.price*0.06).toFixed(2):0;
    await sb.from("payments").insert({
      appointment_id:data.id,method:appPayment.value,
      amount:s.price,sst,total:s.price+sst
    });
    resetAppointment();
  };

  window.resetAppointment=()=>{
    appTime.value=""; appNotes.value=""; appPayment.value="Cash";
  };

  const today=new Date().toISOString().slice(0,10);
  dutyDate.value=today;
  appDate.value=today;
  appPrice.value=SERVICES[0].price;

  loadClients();
  loadPractitioners();
  loadOnDuty();
};
</script>

</body>
</html>

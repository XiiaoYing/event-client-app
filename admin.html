<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Client Management</title>

  <!-- Google Font -->
  <link rel="preconnect" href="  <link rel="preconnect" href="https://fonts.gstatic//fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap"
    rel="stylesheet"
="https://cdn/npm/@supabase/supabase-js@2</script>

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: #ffffff;
      font-family: 'Montserrat', sans-serif;
    }

    header {
      padding: 16px 20px;
      background: #000;
      border-bottom: 2px solid #ff7a00;
    }

    header h1 {
      margin: 0;
      color: #ff7a00;
      font-weight: 800;
    }

    main {
      max-width: 1200px;
      margin: auto;
      padding: 24px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      border-radius: 6px;
      border: none;
      background: #1f1f1f;
      color: white;
      width: 260px;
    }

    button {
      padding: 10px 14px;
      background: #ff7a00;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #151515;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #222;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #111;
      color: #ffb366;
      font-size: 12px;
      text-transform: uppercase;
    }

    tr:hover {
      background: #202020;
    }

    .danger {
      background: #ff4d4d;
      color: white;
      padding: 6px 10px;
    }

    .empty {
      margin-top: 20px;
      color: #aaa;
    }
  </style>
</head>

<body>

<header>
  <h1>CLIENT MANAGEMENT</h1>
</header>

<main>

<div class="toolbar">
  <input
    id="search"
    placeholder="Search name / contact / IC"
    oninput="filterClients()"
  />

  <button onclick="addClient()">➕ Add Client</button>

  <button onclick="toggleMore()" id="toggleBtn">
    👁 Show More
  </button>
</div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Gender</th>
        <th>Citizenship</th>
        <th>Contact</th>
        <th>IC / Passport</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div id="empty" class="empty"></div>

</main>

<script>
  const supabase = supabaseJs.createClient(
    "https://eookqiucuncovvxzdcml.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvb2txaXVjdW5jb3Z2eHpkY21sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTIwNDksImV4cCI6MjA5MTc2ODA0OX0.Bk9QU8CufXnyiavO35WWM3gj1GupNRBk3EJZx-tO9hU"
  );

  let clients = [];

  function age(dob) {
    return new Date().getFullYear() - new Date(dob).getFullYear();
  }

  async function loadClients() {
    const { data, error } = await supabase
      .from("clients")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      document.getElementById("empty").textContent = error.message;
      return;
    }

    clients = data;
    render(data);
  }

  function render(data) {
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    if (!data.length) {
      document.getElementById("empty").textContent = "No clients found";
      return;
    }

    document.getElementById("empty").textContent = "";

    data.forEach(c => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${c.full_name}</td>
        <td>${age(c.date_of_birth)}</td>
        <td>${c.gender}</td>
        <td>${c.citizenship}</td>
        <td>${c.contact || "-"}</td>
        <td>${c.ic_passport}</td>
        <td>
  <button onclick="bookAppointment('${c.id}')">
    📅 Appointment
  </button>
          <button class="danger" onclick="removeClient('${c.id}')">
            Delete
          </button>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  function filterClients() {
    const q = search.value.toLowerCase();
    render(
      clients.filter(c =>
        c.full_name.toLowerCase().includes(q) ||
        (c.contact || "").includes(q) ||
        c.ic_passport.includes(q)
      )
    );
  }

  async function addClient() {
    const full_name = prompt("Full Name:");
    if (!full_name) return;

    const date_of_birth = prompt("DOB (YYYY-MM-DD):");
    const gender = prompt("Gender:");
    const citizenship = prompt("Citizenship:");
    const ic_passport = prompt("IC / Passport:");

    if (citizenship === "Malaysian" && !/^\d{12}$/.test(ic_passport)) {
      alert("Malaysian IC must be 12 digits");
      return;
    }

    await supabase.from("clients").insert({
      full_name, date_of_birth, gender,
      citizenship, ic_passport
    });
async function bookAppointment(clientId) {
  const serviceList = SERVICES.map(
    s => `${s.name} (${s.duration} mins)`
  ).join("\n");

  const serviceName = prompt(
    "Choose service:\n\n" + serviceList
  );

  if (!serviceName) return;

  const service = SERVICES.find(s => s.name === serviceName);
  if (!service) {
    alert("Invalid service name. Please copy exactly.");
    return;
  }

  const startInput = prompt(
    "Start time (YYYY-MM-DD HH:mm)\nExample: 2026-04-20 10:00"
  );
  if (!startInput) return;

  const startTime = new Date(startInput);
  if (isNaN(startTime)) {
    alert("Invalid date format");
    return;
  }

  const endTime = new Date(startTime);
  if (service.duration > 0) {
    endTime.setMinutes(startTime.getMinutes() + service.duration);
  }

  const practitioner = prompt("Practitioner on duty:");
  if (!practitioner) return;

  const { error } = await supabase
    .from("appointments")
    .insert({
      client_id: clientId,
      service_name: service.name,
      start_time: startTime.toISOString(),
      end_time: endTime.toISOString(),
      practitioner
    });

  if (error) {
    alert("Failed to book appointment: " + error.message);
  } else {
    alert(
      `Appointment booked!\n\n` +
      `Service: ${service.name}\n` +
      `Start: ${startTime.toLocaleString()}\n` +
      `End: ${endTime.toLocaleString()}`
    );
  }
}

    loadClients();
  }

  async function removeClient(id) {
    if (!confirm("Delete client permanently?")) return;
    await supabase.from("clients").delete().eq("id", id);
    loadClients();
  }

  loadClients();
const SERVICES = [
  { name: "Sports Massage", duration: 15, price: 45 },
  { name: "Recovery Compression Boots", duration: 10, price: 25 },
  { name: "Assisted Stretch Session", duration: 10, price: 20 },
  { name: "Physio Bundle", duration: 0, price: 400 },
  { name: "Performance Kickstart Program", duration: 0, price: 261 },
  { name: "Sports Massage - First Trial", duration: 0, price: 189 }
];
``
</script>

</body>
</html>

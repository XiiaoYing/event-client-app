<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin – Client Management</title>

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#0b0b0b;
  color:#fff;
}

header {
  padding:16px 24px;
  background:#000;
  border-bottom:2px solid #ff7a00;
}

header h1 { margin:0;color:#ff7a00 }

.container {
  max-width:1200px;
  margin:auto;
  padding:24px;
}

.top-bar {
  display:flex;
  gap:12px;
  margin-bottom:16px;
}

button {
  padding:10px 14px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:700;
}

.primary { background:#ff7a00;color:#000 }
.danger { background:#ff4d4d;color:#fff }

input,select,textarea {
  padding:10px;
  border-radius:6px;
  border:none;
  background:#1f1f1f;
  color:#fff;
}

table {
  width:100%;
  border-collapse:collapse;
  background:#151515;
}

th,td {
  padding:12px;
  border-bottom:1px solid #222;
  font-size:14px;
}

th {
  background:#111;
  color:#ffb366;
  font-size:12px;
}

.more { display:none }

.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content {
  background:#151515;
  padding:24px;
  border-radius:12px;
  width:420px;
}

.modal h2 { color:#ff7a00;margin-top:0 }
.modal label { font-size:12px;color:#ffb366 }

.modal input,.modal select,.modal textarea {
  width:100%;
  margin-bottom:10px;
}

.footer {
  text-align:center;
  color:#aaa;
  margin-top:20px;
  font-size:12px;
}
</style>
</head>

<body>

<header>
  <h1>ADMIN – CLIENT MANAGEMENT</h1>
</header>

<div class="container">

<h2 style="color:#ff7a00">Practitioner On Duty</h2>
<div class="top-bar">
  <input id="practitionerName" placeholder="Practitioner name">
  <button class="primary" onclick="addPractitioner()">➕ Add Practitioner</button>
</div>
<table>
<thead><tr><th>Name</th><th>Action</th></tr></thead>
<tbody id="practitionerBody"></tbody>
</table>

<hr style="margin:30px 0;border:1px solid #222">

<div class="top-bar">
  <input id="search" placeholder="Search client" oninput="filterClients()">
  <button class="primary" onclick="openAddClient()">➕ Add Client</button>
  <button class="primary" id="toggleBtn" onclick="toggleMore()">👁 Show More</button>
</div>

<table>
<thead>
<tr>
  <th>Name</th><th>Age</th><th>Gender</th><th>Citizenship</th>
  <th>Contact</th><th>IC / Passport</th>
  <th class="more">Email</th><th class="more">Address</th>
  <th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div id="empty" class="footer"></div>
</div>

<!-- ADD CLIENT MODAL -->
<div class="modal" id="clientModal">
<div class="modal-content">
<h2>Add Client</h2>

<label>Full Name</label><input id="m_name">
<label>Date of Birth</label><input id="m_dob" type="date">
<label>Gender</label>
<select id="m_gender"><option>Male</option><option>Female</option></select>
<label>Citizenship</label>
<select id="m_citizen"><option>Malaysian</option><option>Foreigner</option></select>
<label>IC / Passport</label><input id="m_ic">
<label>Contact</label><input id="m_contact">
<label>Email</label><input id="m_email">
<label>Address</label><textarea id="m_address"></textarea>

<button class="primary" onclick="saveClient()">Save</button>
<button class="danger" onclick="closeModal()">Cancel</button>
</div>
</div>

<script>
const supabase = supabaseJs.createClient(
  "https://eookqiucuncovvxzdcml.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvb2txaXVjdW5jb3Z2eHpkY21sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTIwNDksImV4cCI6MjA5MTc2ODA0OX0.Bk9QU8CufXnyiavO35WWM3gj1GupNRBk3EJZx-tO9hU"
);

let clients=[],practitioners=[],showMore=false;

const SERVICES=[
 {name:"Sports Massage",duration:15,price:45},
 {name:"Recovery Compression Boots",duration:10,price:25},
 {name:"Assisted Stretch Session",duration:10,price:20},
 {name:"Physio Bundle",duration:0,price:400},
 {name:"Performance Kickstart Program",duration:0,price:261},
 {name:"Sports Massage - First Trial",duration:0,price:189}
];

const age=d=>new Date().getFullYear()-new Date(d).getFullYear();

async function loadClients(){
 const {data}=await supabase.from("clients").select("*").order("created_at",{ascending:false});
 clients=data||[];render(clients);
}

function render(data){
 tbody.innerHTML="";
 if(!data.length){empty.textContent="No clients";return;}
 empty.textContent="";
 data.forEach(c=>{
 tbody.innerHTML+=`
<tr>
<td>${c.full_name}</td>
<td>${age(c.date_of_birth)}</td>
<td>${c.gender}</td>
<td>${c.citizenship}</td>
<td>${c.contact||"-"}</td>
<td>${c.ic_passport}</td>
<td class="more">${c.email||"-"}</td>
<td class="more">${c.address||"-"}</td>
<td>
<button onclick="book('${c.id}')">📅</button>
<button class="danger" onclick="del('${c.id}')">🗑</button>
</td>
</tr>`;
 });
 applyMore();
}

function filterClients(){
 const q=search.value.toLowerCase();
 render(clients.filter(c=>c.full_name.toLowerCase().includes(q)));
}

function toggleMore(){
 showMore=!showMore;
 toggleBtn.innerText=showMore?"🙈 Show Less":"👁 Show More";
 applyMore();
}

function applyMore(){
 document.querySelectorAll(".more").forEach(c=>c.style.display=showMore?"table-cell":"none");
}

function openAddClient(){clientModal.style.display="flex";}
function closeModal(){clientModal.style.display="none";}

async function saveClient(){
 if(m_citizen.value==="Malaysian"&&!/^\d{12}$/.test(m_ic.value)){
  alert("Malaysian IC must be 12 digits");return;
 }
 await supabase.from("clients").insert({
  full_name:m_name.value,date_of_birth:m_dob.value,
  gender:m_gender.value,citizenship:m_citizen.value,
  ic_passport:m_ic.value,contact:m_contact.value,
  email:m_email.value,address:m_address.value
 });
 closeModal();loadClients();
}

async function del(id){
 if(confirm("Delete client?")){await supabase.from("clients").delete().eq("id",id);loadClients();}
}

// Practitioner
async function loadPractitioners(){
 const {data}=await supabase.from("practitioners").select("*").eq("active",true);
 practitioners=data||[];renderPractitioners();
}

function renderPractitioners(){
 practitionerBody.innerHTML="";
 practitioners.forEach(p=>{
  practitionerBody.innerHTML+=`
<tr>
<td>${p.name}</td>
<td><button class="danger" onclick="removePractitioner('${p.id}')">Remove</button></td>
</tr>`;
 });
}

async function addPractitioner(){
 if(!practitionerName.value)return;
 await supabase.from("practitioners").insert({name:practitionerName.value});
 practitionerName.value="";loadPractitioners();
}

async function removePractitioner(id){
 if(confirm("Remove practitioner?")){
  await supabase.from("practitioners").update({active:false}).eq("id",id);
  loadPractitioners();
 }
}

// Appointment + Payment + SST
async function book(clientId){
 if(!practitioners.length){alert("No practitioner on duty");return;}
 const s=prompt("Service:\n"+SERVICES.map(x=>x.name).join("\n"));
 const svc=SERVICES.find(x=>x.name===s); if(!svc)return;
 const st=new Date(prompt("Start (YYYY-MM-DD HH:mm)"));
 const et=new Date(st); et.setMinutes(st.getMinutes()+svc.duration);
 const pr=prompt("Practitioner:\n"+practitioners.map(p=>p.name).join("\n"));
 const {data}=await supabase.from("appointments").insert({
  client_id:clientId,service_name:s,
  start_time:st,end_time:et,practitioner:pr
 }).select().single();
 pay(data.id,svc.price,clientId);
}

async function pay(appId,amt,clientId){
 const m=prompt("Payment method");
 const {data:c}=await supabase.from("clients").select("citizenship").eq("id",clientId).single();
 const sst=c.citizenship==="Foreigner"?+(amt*0.06).toFixed(2):0;
 await supabase.from("payments").insert({appointment_id:appId,method:m,amount:amt,sst,total:amt+sst});
 alert(`Payment saved\nRM${amt}\nSST RM${sst}`);
}

loadPractitioners();
loadClients();
</script>

</body>
</html>

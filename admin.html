<script>
  // =============================
  // SUPABASE CONNECTION
  // =============================
  const supabase = supabaseJs.createClient(
    "https://eookqiucuncovvxzdcml.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvb2txaXVjdW5jb3Z2eHpkY21sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTIwNDksImV4cCI6MjA5MTc2ODA0OX0.Bk9QU8CufXnyiavO35WWM3gj1GupNRBk3EJZx-tO9hU"
  );

  let clients = [];

  // =============================
  // LOAD CLIENTS FROM DATABASE
  // =============================
  async function loadClients() {
    const { data, error } = await supabase
      .from("clients")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      alert("Failed to load clients: " + error.message);
      return;
    }

    clients = data;
    renderTable(data);
  }

  // =============================
  // CALCULATE AGE
  // =============================
  function calculateAge(dob) {
    if (!dob) return "-";
    return new Date().getFullYear() - new Date(dob).getFullYear();
  }

  // =============================
  // RENDER CLIENT TABLE
  // =============================
  function renderTable(data) {
    const tbody = document.querySelector("#clientTable tbody");
    tbody.innerHTML = "";

    if (data.length === 0) {
      document.getElementById("empty").textContent = "No clients found.";
      return;
    }

    document.getElementById("empty").textContent = "";

    data.forEach((client) => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${client.full_name}</td>
        <td>${calculateAge(client.date_of_birth)}</td>
        <td>${client.gender}</td>
        <td>${client.citizenship}</td>
        <td>${client.contact || "-"}</td>
        <td>${client.ic_passport}</td>
        <td>${new Date(client.created_at).toLocaleString()}</td>
        <td>
          <button
            style="background:#ff4d4d;border:none;color:white;padding:6px 10px;border-radius:4px;cursor:pointer"
            onclick="deleteClient('${client.id}')"
          >
            Delete
          </button>
        </td>
      `;

      tbody.appendChild(tr);
    });
  }

  // =============================
  // SEARCH / FILTER CLIENTS
  // =============================
  function filterClients() {
    const q = document.getElementById("search").value.toLowerCase();

    const filtered = clients.filter((c) =>
      c.full_name.toLowerCase().includes(q) ||
      (c.contact || "").toLowerCase().includes(q) ||
      c.ic_passport.toLowerCase().includes(q)
    );

    renderTable(filtered);
  }

  // =============================
  // MANUAL ADD CLIENT (STAFF)
  // =============================
  async function addClient() {
    const full_name = prompt("Full Name:");
    if (!full_name) return;

    const dob = prompt("Date of Birth (YYYY-MM-DD):");
    if (!dob) return;

    const gender = prompt("Gender (Male / Female):");
    if (!gender) return;

    const citizenship = prompt("Citizenship (Malaysian / Foreigner):");
    if (!citizenship) return;

    const ic_passport = prompt("IC / Passport Number:");
    if (!ic_passport) return;

    // Malaysian IC validation
    if (citizenship === "Malaysian" && !/^\d{12}$/.test(ic_passport)) {
      alert("Malaysian IC must be exactly 12 digits.");
      return;
    }

    const contact = prompt("Contact Number (optional):");
    const email = prompt("Email (optional):");
    const address = prompt("Address (optional):");

    const { error } = await supabase.from("clients").insert({
      full_name,
      date_of_birth: dob,
      gender,
      citizenship,
      ic_passport,
      contact,
      email,
      address
    });

    if (error) {
      alert("Failed to add client: " + error.message);
    } else {
      alert("Client added successfully.");
      loadClients();
    }
  }

  // =============================
  // DELETE CLIENT (STAFF)
  // =============================
  async function deleteClient(clientId) {
    const confirmDelete = confirm(
      "Are you sure you want to permanently delete this client?"
    );
    if (!confirmDelete) return;

    const { error } = await supabase
      .from("clients")
      .delete()
      .eq("id", clientId);

    if (error) {
      alert("Failed to delete client: " + error.message);
    } else {
      alert("Client deleted.");
      loadClients();
    }
  }

  // =============================
  // INIT
  // =============================
  loadClients();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<!-- Supabase v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #0b0b0b;
  color: #fff;
}
header {
  display: flex;
  gap: 10px;
  padding: 16px;
  background: #000;
  border-bottom: 2px solid #ff7a00;
}
header button {
  background: #1f1f1f;
  color: #fff;
  border: none;
  padding: 10px 14px;
  border-radius: 6px;
  cursor: pointer;
}
header button.active {
  background: #ff7a00;
  color: #000;
  font-weight: 700;
}
.container {
  max-width: 1200px;
  margin: auto;
  padding: 24px;
}
.hidden { display: none; }

input, select, textarea {
  width: 100%;
  padding: 10px;
  background: #1f1f1f;
  border: none;
  border-radius: 6px;
  color: #fff;
  margin-bottom: 10px;
}

button.primary {
  background: #ff7a00;
  color: #000;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 700;
}
button.danger {
  background: #ff4d4d;
  color: #fff;
  border: none;
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: #151515;
  margin-top: 10px;
}
th, td {
  padding: 10px;
  border-bottom: 1px solid #222;
  font-size: 13px;
}
th {
  background: #111;
  color: #ffb366;
  font-size: 12px;
}

.section {
  margin-top: 20px;
}
h2 { color:#ff7a00; }
</style>
</head>

<body>

<header>
  <button class="active" onclick="switchTab('clients', this)">Clients</button>
  <button onclick="switchTab('practitioners', this)">Practitioners</button>
  <button onclick="switchTab('appointments', this)">Appointments</button>
</header>

<div class="container">

<!-- CLIENTS -->
<div id="clientsTab">
  <h2>Clients</h2>
  <button class="primary" onclick="addClient()">➕ Add Client</button>

  <table>
    <thead>
      <tr>
        <th>Name</th><th>DOB</th><th>Age</th><th>Gender</th>
        <th>Citizenship</th><th>Contact</th><th>Email</th>
        <th>IC / Passport</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="clientsBody"></tbody>
  </table>
</div>

<!-- PRACTITIONERS -->
<div id="practitionersTab" class="hidden">
  <h2>Practitioners</h2>

  <input id="pracName" placeholder="Practitioner name">
  <button class="primary" onclick="addPractitioner()">Add Practitioner</button>

  <div class="section">
    <h3>On Duty (by date)</h3>
    <input type="date" id="dutyDate">
    <table>
      <thead><tr><th>Name</th><th>On Duty</th></tr></thead>
      <tbody id="dutyBody"></tbody>
    </table>
    <button class="primary" onclick="saveDuty()">Save Duty</button>
  </div>
</div>

<!-- APPOINTMENTS -->
<div id="appointmentsTab" class="hidden">
  <h2>New Appointment</h2>

  <label>Date</label>
  <input type="date" id="appDate">

  <label>Client</label>
  <select id="appClient"></select>

  <label>Service</label>
  <select id="appService"></select>

  <label>Price (RM)</label>
  <input id="appPrice" readonly>

  <label>Start Time (HH:mm)</label>
  <input id="appTime">

  <label>Practitioner (On Duty)</label>
  <select id="appPractitioner"></select>

  <label>Session Notes</label>
  <textarea id="appNotes"></textarea>

  <label>Payment Method</label>
  <select id="appPayment">
    <option>Cash</option>
    <option>Card</option>
    <option>E-wallet</option>
  </select>

  <button class="primary" onclick="saveAppointment()">Save Appointment & Payment</button>
</div>

</div>

<script>
window.onload = () => {
  const sb = supabase.createClient(
    "https://eookqiucuncovvxzdcml.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvb2txaXVjdW5jb3Z2eHpkY21sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTIwNDksImV4cCI6MjA5MTc2ODA0OX0.Bk9QU8CufXnyiavO35WWM3gj1GupNRBk3EJZx-tO9hU"
  );

  const SERVICES = [
    { name:"Sports Massage", price:45, duration:15 },
    { name:"Recovery Compression Boots", price:25, duration:10 },
    { name:"Assisted Stretch Session", price:20, duration:10 }
  ];

  let clients=[], practitioners=[];

  function switchTab(tab, btn){
    ["clients","practitioners","appointments"].forEach(t=>{
      document.getElementById(t+"Tab").classList.add("hidden");
    });
    document.getElementById(tab+"Tab").classList.remove("hidden");
    document.querySelectorAll("header button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
  window.switchTab = switchTab;

  async function loadClients(){
    const {data}=await sb.from("clients").select("*");
    clients=data||[];
    clientsBody.innerHTML="";
    appClient.innerHTML="";
    clients.forEach(c=>{
      const age=new Date().getFullYear()-new Date(c.date_of_birth).getFullYear();
      clientsBody.innerHTML+=`
        <tr>
          <td>${c.full_name}</td>
          <td>${c.date_of_birth}</td>
          <td>${age}</td>
          <td>${c.gender}</td>
          <td>${c.citizenship}</td>
          <td>${c.contact||""}</td>
          <td>${c.email||""}</td>
          <td>${c.ic_passport}</td>
          <td>
            <button class="primary" onclick="editClient('${c.id}')">Edit</button>
            <button class="danger" onclick="deleteClient('${c.id}')">Delete</button>
          </td>
        </tr>`;
      appClient.innerHTML+=`<option value="${c.id}">${c.full_name}</option>`;
    });
  }

  window.addClient = () => {
    const name = prompt("Full Name:");
    const dob = prompt("DOB (YYYY-MM-DD):");
    const gender = prompt("Gender:");
    const citizenship = prompt("Citizenship:");
    const ic = prompt("IC / Passport:");
    if (!name||!dob||!gender||!citizenship||!ic) return;
    sb.from("clients").insert({
      full_name:name,date_of_birth:dob,gender,citizenship,ic_passport:ic
    }).then(loadClients);
  };

  window.editClient = async (id) => {
    const c = clients.find(x=>x.id===id);
    const name = prompt("Full Name", c.full_name);
    const dob = prompt("DOB", c.date_of_birth);
    const gender = prompt("Gender", c.gender);
    const citizenship = prompt("Citizenship", c.citizenship);
    const contact = prompt("Contact", c.contact||"");
    const email = prompt("Email", c.email||"");
    const ic = prompt("IC / Passport", c.ic_passport);
    sb.from("clients").update({
      full_name:name,date_of_birth:dob,gender,citizenship,
      contact,email,ic_passport:ic
    }).eq("id",id).then(loadClients);
  };

  window.deleteClient=id=>{
    if(confirm("Delete client?")) sb.from("clients").delete().eq("id",id).then(loadClients);
  };

  async function loadPractitioners(){
    const {data}=await sb.from("practitioners").select("*").eq("active",true);
    practitioners=data||[];
    renderDuty();
  }

  function renderDuty(){
    dutyBody.innerHTML="";
    practitioners.forEach(p=>{
      dutyBody.innerHTML+=`
        <tr>
          <td>${p.name}</td>
          <td><input type="checkbox" data-id="${p.id}"></td>
        </tr>`;
    });
  }

  window.addPractitioner=()=>{
    if(!pracName.value) return;
    sb.from("practitioners").insert({name:pracName.value})
      .then(()=>{pracName.value="";loadPractitioners();});
  };

  window.saveDuty=async()=>{
    await sb.from("practitioner_duty").delete().eq("duty_date",dutyDate.value);
    document.querySelectorAll("#dutyBody input:checked").forEach(i=>{
      sb.from("practitioner_duty").insert({
        practitioner_id:i.dataset.id,duty_date:dutyDate.value,on_duty:true
      });
    });
    alert("Duty saved");
  };

  SERVICES.forEach(s=>appService.innerHTML+=`<option>${s.name}</option>`);
  appService.onchange=()=>appPrice.value=SERVICES.find(s=>s.name===appService.value).price;

  async function loadOnDuty(){
    const {data}=await sb.from("practitioner_duty")
      .select("practitioners(name)")
      .eq("duty_date",appDate.value);
    appPractitioner.innerHTML="";
    data.forEach(d=>appPractitioner.innerHTML+=`<option>${d.practitioners.name}</option>`);
  }
  appDate.onchange=loadOnDuty;

  window.saveAppointment=async()=>{
    const c=clients.find(x=>x.id===appClient.value);
    const s=SERVICES.find(x=>x.name===appService.value);
    const start=new Date(appDate.value+"T"+appTime.value);
    const end=new Date(start); end.setMinutes(start.getMinutes()+s.duration);
    const {data}=await sb.from("appointments").insert({
      client_id:c.id,service_name:s.name,
      start_time:start,end_time:end,
      practitioner:appPractitioner.value,
      remarks:appNotes.value
    }).select().single();
    const sst=c.citizenship==="Foreigner"?+(s.price*0.06).toFixed(2):0;
    await sb.from("payments").insert({
      appointment_id:data.id,method:appPayment.value,
      amount:s.price,sst,total:s.price+sst
    });
    alert("Appointment & payment saved");
  };

  const today=new Date().toISOString().slice(0,10);
  dutyDate.value=today;
  appDate.value=today;
  appPrice.value=SERVICES[0].price;

  loadClients();
  loadPractitioners();
  loadOnDuty();
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Admin Dashboard</title>

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #0b0b0b;
  color: #fff;
}
header {
  display: flex;
  gap: 10px;
  padding: 16px;
  background: #000;
  border-bottom: 2px solid #ff7a00;
}
header button {
  background: #1f1f1f;
  color: #fff;
  border: none;
  padding: 10px 14px;
  border-radius: 6px;
  cursor: pointer;
}
header button.active {
  background: #ff7a00;
  color: #000;
  font-weight: 700;
}
.container {
  max-width: 1200px;
  margin: auto;
  padding: 24px;
}
.hidden { display: none; }
input, select, textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  background: #1f1f1f;
  border: none;
  color: #fff;
  border-radius: 6px;
}
button.primary {
  background: #ff7a00;
  color: #000;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 700;
}
button.danger {
  background: #ff4d4d;
  color: #fff;
  border: none;
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
}
table {
  width: 100%;
  border-collapse: collapse;
  background: #151515;
  margin-top: 10px;
}
th, td {
  padding: 12px;
  border-bottom: 1px solid #222;
}
th {
  background: #111;
  color: #ffb366;
  font-size: 12px;
}
.section-title {
  color: #ff7a00;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<header>
  <button class="active" onclick="showTab('clients')">Clients</button>
  <button onclick="showTab('practitioners')">Practitioners</button>
  <button onclick="showTab('appointments')">Appointments</button>
</header>

<div class="container">

<!-- CLIENTS TAB -->
<div id="clientsTab">
  <h2 class="section-title">Clients</h2>
  <button class="primary" onclick="openAddClient()">➕ Add Client</button>
  <table>
    <thead>
      <tr><th>Name</th><th>Contact</th><th>Action</th></tr>
    </thead>
    <tbody id="clientsBody"></tbody>
  </table>
</div>

<!-- PRACTITIONERS TAB -->
<div id="practitionersTab" class="hidden">
  <h2 class="section-title">Practitioners On Duty</h2>
  <input id="pracName" placeholder="Practitioner name">
  <button class="primary" onclick="addPractitioner()">Add Practitioner</button>
  <table>
    <thead><tr><th>Name</th><th>Action</th></tr></thead>
    <tbody id="pracBody"></tbody>
  </table>
</div>

<!-- APPOINTMENTS TAB -->
<div id="appointmentsTab" class="hidden">
  <h2 class="section-title">New Appointment</h2>

  <label>Client</label>
  <select id="appClient"></select>

  <label>Service</label>
  <select id="appService" onchange="updatePrice()"></select>

  <label>Price (RM)</label>
  <input id="appPrice" readonly>

  <label>Start Time (YYYY-MM-DD HH:mm)</label>
  <input id="appStart">

  <label>Practitioner</label>
  <select id="appPractitioner"></select>

  <label>Session Notes</label>
  <textarea id="appNotes"></textarea>

  <label>Payment Method</label>
  <select id="appPayment">
    <option>Cash</option>
    <option>Card</option>
    <option>E-wallet</option>
  </select>

  <button class="primary" onclick="saveAppointment()">Save Appointment & Payment</button>
</div>

</div>

<script>
const supabase = supabaseJs.createClient(
  "https://eookqiucuncovvxzdcml.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvb2txaXVjdW5jb3Z2eHpkY21sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxOTIwNDksImV4cCI6MjA5MTc2ODA0OX0.Bk9QU8CufXnyiavO35WWM3gj1GupNRBk3EJZx-tO9hU"
);

const SERVICES = [
  {name:"Sports Massage",price:45,duration:15},
  {name:"Recovery Compression Boots",price:25,duration:10},
  {name:"Assisted Stretch Session",price:20,duration:10},
];

let clients=[], practitioners=[];

// TAB SWITCH
function showTab(tab){
  document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
  document.getElementById(tab+"Tab").classList.remove("hidden");
  document.querySelectorAll("header button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}

// LOAD DATA
async function loadClients(){
  const {data}=await supabase.from("clients").select("*");
  clients=data||[];
  clientsBody.innerHTML="";
  appClient.innerHTML="";
  clients.forEach(c=>{
    clientsBody.innerHTML+=`<tr>
      <td>${c.full_name}</td>
      <td>${c.contact||""}</td>
      <td><button class="danger" onclick="delClient('${c.id}')">Delete</button></td>
    </tr>`;
    appClient.innerHTML+=`<option value="${c.id}">${c.full_name}</option>`;
  });
}

async function loadPractitioners(){
  const {data}=await supabase.from("practitioners").select("*").eq("active",true);
  practitioners=data||[];
  pracBody.innerHTML="";
  appPractitioner.innerHTML="";
  practitioners.forEach(p=>{
    pracBody.innerHTML+=`<tr>
      <td>${p.name}</td>
      <td><button class="danger" onclick="removePractitioner('${p.id}')">Remove</button></td>
    </tr>`;
    appPractitioner.innerHTML+=`<option>${p.name}</option>`;
  });
}

// CLIENT
function openAddClient(){
  const n=prompt("Name"); const ic=prompt("IC"); if(!n) return;
  supabase.from("clients").insert({full_name:n,ic_passport:ic}).then(loadClients);
}
function delClient(id){
  if(confirm("Delete client?")) supabase.from("clients").delete().eq("id",id).then(loadClients);
}

// PRACTITIONER
function addPractitioner(){
  if(!pracName.value) return;
  supabase.from("practitioners").insert({name:pracName.value}).then(()=>{
    pracName.value=""; loadPractitioners();
  });
}
function removePractitioner(id){
  supabase.from("practitioners").update({active:false}).eq("id",id).then(loadPractitioners);
}

// APPOINTMENT
SERVICES.forEach(s=>{
  appService.innerHTML+=`<option>${s.name}</option>`;
});

function updatePrice(){
  const s=SERVICES.find(x=>x.name===appService.value);
  appPrice.value=s.price;
}

async function saveAppointment(){
  const service=SERVICES.find(x=>x.name===appService.value);
  const start=new Date(appStart.value);
  const end=new Date(start);
  end.setMinutes(start.getMinutes()+service.duration);

  const client=clients.find(c=>c.id===appClient.value);
  const sst=client.citizenship==="Foreigner"? +(service.price*0.06).toFixed(2):0;

  const {data}=await supabase.from("appointments").insert({
    client_id:client.id,
    service_name:service.name,
    start_time:start,
    end_time:end,
    practitioner:appPractitioner.value,
    remarks:appNotes.value
  }).select().single();

  await supabase.from("payments").insert({
    appointment_id:data.id,
    method:appPayment.value,
    amount:service.price,
    sst,
    total:service.price+sst
  });

  alert("Appointment & Payment saved");
}

loadClients();
loadPractitioners();
updatePrice();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Test</title>

  <!-- Proper Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0b0b0b;
      color: white;
      padding: 40px;
    }
    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      background: orange;
      border: none;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <h1>✅ Admin Click Test</h1>

  <button onclick="testClick()">Click Me</button>

  <p id="result"></p>

  <script>
    function testClick() {
      document.getElementById("result").innerText = "✅ Button click works!";
      alert("Button is clickable");
    }
  </script>

</body>
</html>

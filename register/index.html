<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Client Registration | Dynamique Sports Rehab Centre</title>

  <!-- ✅ LOAD SUPABASE FIRST -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      padding: 40px 16px;
      background: #0f0f0f;
      font-family: Arial, sans-serif;
      color: #000;
    }
    .card {
      max-width: 420px;
      margin: auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
    }
    h2 {
      text-align: center;
    }
    label {
      display: block;
      margin-top: 12px;
      font-size: 13px;
      font-weight: bold;
    }
    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
      box-sizing: border-box;
    }
    textarea {
      min-height: 60px;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #ff7a00;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    .msg {
      margin-top: 16px;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Client Registration</h2>

  <label>Full Name *</label>
  <input id="full_name">

  <label>Date of Birth *</label>
  <input type="date" id="dob">

  <label>Contact *</label>
  <input id="contact">

  <label>Gender</label>
  <select id="gender">
    <option value="">Select</option>
    <option>Male</option>
    <option>Female</option>
  </select>

  <label>Address</label>
  <textarea id="address"></textarea>

  <button id="registerBtn" type="button">REGISTER</button>

  <div id="msg" class="msg"></div>
</div>

<!-- ✅ YOUR SCRIPT COMES AFTER SUPABASE -->

  );

  document.getElementById("registerBtn").addEventListener("click", registerClient);

  async function registerClient() {
    const msg = document.getElementById("msg");
    msg.textContent = "";

const payload = {
  full_name: full_name.value.trim(),
  date_of_birth: dob.value,
  gender: gender.value,
  citizenship: citizenship.value,
  ic_passport: ic_passport.value,

  email: email.value,

};

    if (!payload.full_name || !payload.date_of_birth || !payload.contact) {
      msg.style.color = "red";
      msg.textContent = "Please fill all required fields";

      msg.style.color = "red";
      msg.textContent = error.message;
    } else {
      msg.style.color = "green";
      msg.textContent = "✅ Registration successful";
      document.querySelectorAll("input, textarea").forEach(e => e.value = "");
    }
  }

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Client Registration | Dynamique Sports Rehab Centre</title>

  <!-- ✅ Supabase Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Montserrat", sans-serif;
    background: radial-gradient(circle at top, #111 0%, #000 60%);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 520px;
    background: #ffffff;
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  }

  .brand {
    text-align: center;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 1px;
  }

  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #777;
    margin-bottom: 22px;
  }

  label {
    display: block;
    margin-top: 12px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input, select, textarea {
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    font-size: 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    transition: border 0.2s, box-shadow 0.2s;
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #ff7a00;
    box-shadow: 0 0 0 2px rgba(255,122,0,0.25);
  }

  input[readonly] {
    background: #f2f2f2;
    color: #555;
  }

  textarea {
    resize: vertical;
    min-height: 70px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
  }

  button {
    margin-top: 26px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #ff7a00, #ff9f43);
    color: #000;
    font-weight: 900;
    font-size: 15px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(255,122,0,0.45);
  }

  .msg {
    margin-top: 14px;
    text-align: center;
    font-weight: 700;
    font-size: 14px;
  }

  @media (max-width: 600px) {
    .grid-2, .grid-3 {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<body>

<div class="card">
  <h2>Client Registration</h2>

  <label>Full Name *</label>
  <input id="full_name">

  <label>Date of Birth *</label>
  <input type="date" id="dob">

  <label>Age</label>
  <input id="age" readonly>

  <label>Gender *</label>
  <select id="gender">
    <option value="">Select</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
  </select>

  <label>Citizenship *</label>
  <select id="citizenship">
    <option value="">Select</option>
    <option value="Malaysian">Malaysian</option>
    <option value="Foreigner">Foreigner</option>
  </select>

  <label>IC / Passport *</label>
  <input id="ic_passport">

  <label>Contact *</label>
  <input id="contact">

  <label>Email</label>
  <input type="email" id="email">

  <label>Address</label>
  <textarea id="address"></textarea>

  <button id="registerBtn" type="button">REGISTER</button>

  <div id="msg" class="msg"></div>
</div>

<script>
/* ================= SUPABASE ================= */
const supabaseClient = supabase.createClient(
  "https://yxkospvcqkoxiravjtqd.supabase.co",        // e.g. https://abcd1234.supabase.co
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4a29zcHZjcWtveGlyYXZqdHFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODEyNzEsImV4cCI6MjA5MTg1NzI3MX0.Aaw6wfcXf21uwgMQJWtiVN_vxqaqevEQerx2GjOG-Jc"    // anon public key
);

/* ================= AGE AUTO-COMPUTE ================= */
document.addEventListener("DOMContentLoaded", () => {
  const dobInput = document.getElementById("dob");
  const ageInput = document.getElementById("age");

  dobInput.addEventListener("change", () => {
    if (!dobInput.value) {
      ageInput.value = "";
      return;
    }

    const dob = new Date(dobInput.value);
    const today = new Date();

    let age = today.getFullYear() - dob.getFullYear();
    const monthDiff = today.getMonth() - dob.getMonth();

    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) {
      age--;
    }

    ageInput.value = age >= 0 ? age : "";
  });
});

const icInput = document.getElementById("ic_passport");

icInput.addEventListener("input", () => {
  let value = icInput.value;

  // ✅ PASSPORT: starts with a letter
  if (/^[A-Za-z]/.test(value)) {
    // Allow only letters + numbers, uppercase
    icInput.value = value
      .toUpperCase()
      .replace(/[^A-Z0-9]/g, "");
    return;
  }

  // ✅ IC: starts with number
  value = value.replace(/\D/g, ""); // digits only

  if (value.length > 6) {
    value = value.slice(0, 6) + "-" + value.slice(6);
  }
  if (value.length > 9) {
    value = value.slice(0, 9) + "-" + value.slice(9, 13);
  }

  icInput.value = value;
});

  
document.getElementById("contact").addEventListener("input", () => {
  let value = contact.value.replace(/\D/g, ""); // digits only

  if (value.length > 3)
    value = value.slice(0, 3) + "-" + value.slice(3, 11);

  contact.value = value;
});
/* ================= REGISTER CLIENT ================= */
document.getElementById("registerBtn").addEventListener("click", async () => {
  const msg = document.getElementById("msg");
  msg.innerHTML = "";

  const payload = {
    full_name: document.getElementById("full_name").value.trim(),
    date_of_birth: document.getElementById("dob").value,
    gender: document.getElementById("gender").value,
    citizenship: document.getElementById("citizenship").value,
    ic_passport: document.getElementById("ic_passport").value,
    contact: document.getElementById("contact").value,
    email: document.getElementById("email").value,
    address: document.getElementById("address").value
  };

  // ✅ Required field check
  if (
    !payload.full_name ||
    !payload.date_of_birth ||
    !payload.contact ||
    !payload.gender ||
    !payload.citizenship
  ) {
    msg.innerHTML = "<span class='error'>Please fill all required fields *</span>";
    return;
  }

  const { error } = await supabaseClient
    .from("clients")
    .insert(payload);

  if (error) {
    console.error(error);
    msg.innerHTML = `<span class="error">${error.message}</span>`;
  } else {
    msg.innerHTML = "<span class='success'>✅ Registration successful</span>";

    // reset form
    document.querySelectorAll("input, textarea").forEach(el => el.value = "");
    document.getElementById("gender").value = "";
    document.getElementById("citizenship").value = "";
    document.getElementById("age").value = "";
  }
});
</script>

</body>
</html>

);

/* ✅ Wait until DOM is ready, then bind click */
document.addEventListener("DOMContentLoaded", () => {
  const btn = document.getElementById("registerBtn");
  if (btn) {
    btn.addEventListener("click", registerClient);
  }
});

/* ✅ Registration logic */
async function registerClient() {
  const msg = document.getElementById("msg");
  msg.innerHTML = "";

  const payload = {
    full_name: document.getElementById("full_name").value.trim(),
    date_of_birth: document.getElementById("dob").value,
    gender: document.getElementById("gender").value,
    citizenship: document.getElementById("citizenship").value,
    ic_passport: document.getElementById("ic_passport").value,
    contact: document.getElementById("contact").value,
    email: document.getElementById("email").value,
    address: document.getElementById("address").value,
    source: "self_registration"
  };

  if (!payload.full_name || !payload.date_of_birth || !payload.contact) {
    msg.innerHTML = "<span style='color:red'>Please fill all required fields</span>";
    return;
  }

  const { error } = await supabaseClient
    .from("clients")
    .insert(payload);

  if (error) {
    console.error(error);
    msg.innerHTML = `<span style="color:red">${error.message}</span>`;
  } else {
    msg.innerHTML = `<span style="color:green">✅ Registration successful</span>`;
    document.querySelectorAll("input, textarea").forEach(el => el.value = "");
    document.getElementById("gender").value = "";
  }
}
</script>

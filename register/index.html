<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Client Registration</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      padding: 30px;
    }
    .card {
      max-width: 480px;
      margin: auto;
      background: #fff;
      padding: 24px;
      border-radius: 10px;
    }
    label {
      font-weight: bold;
      margin-top: 12px;
      display: block;
    }
    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
    }
    textarea {
      min-height: 60px;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #ff7a00;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Client Registration</h2>

  <label>Full Name *</label>
  <input id="full_name">

  <label>Date of Birth *</label>
  <input type="date" id="dob">

  <label>Age</label>
  <input id="age" readonly>

  <label>Gender *</label>
  <select id="gender">
    <option value="">Select</option>
    <option>Male</option>
    <option>Female</option>
  </select>

  <label>Citizenship *</label>
  <select id="citizenship">
    <option value="">Select</option>
    <option value="Malaysian">Malaysian</option>
    <option value="Foreigner">Foreigner</option>
  </select>

  <label>IC / Passport *</label>
  <input id="ic_passport">

  <label>Contact *</label>
  <input id="contact">

  <label>Email</label>
  <input id="email">

  <label>Address</label>
  <textarea id="address"></textarea>

  <button id="registerBtn">Register</button>
  <div id="msg"></div>
</div>

<script>
const supabaseClient = supabase.createClient(
  "https://yxkospvcqkoxiravjtqd.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4a29zcHZjcWtveGlyYXZqdHFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODEyNzEsImV4cCI6MjA5MTg1NzI3MX0.Aaw6wfcXf21uwgMQJWtiVN_vxqaqevEQerx2GjOG-Jc"
);

// ✅ Auto-calc age
document.getElementById("dob").addEventListener("change", () => {
  const dob = new Date(dob.value);
  const today = new Date();
  let age = today.getFullYear() - dob.getFullYear();
  const m = today.getMonth() - dob.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
  document.getElementById("age").value = isNaN(age) ? "" : age;
});

document.getElementById("registerBtn").addEventListener("click", async () => {
  const payload = {
    full_name: full_name.value.trim(),
    date_of_birth: dob.value,
    gender: gender.value,
    citizenship: citizenship.value,
    ic_passport: ic_passport.value,
    contact: contact.value,
    email: email.value,
    address: address.value
  };

  if (!payload.full_name || !payload.date_of_birth || !payload.contact || !payload.citizenship) {
    msg.innerText = "Please fill all required fields";
    return;
  }

  const { error } = await supabaseClient.from("clients").insert(payload);
  msg.innerText = error ? error.message : "✅ Registration successful";
});
</script>

</body>
</html>
